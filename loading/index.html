<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barzan — the plate is prepared</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #f8f6ef; }
  canvas { display: block; }
  #plate, #fog { position: fixed; inset: 0; }
  /* the ink layer: a small canvas scaled up, so the strokes arrive soft, not crisp.
     The blur is the wet edge. */
  #ink {
    position: fixed; left: 50%; top: 46%; transform: translate(-50%, -50%);
    width: min(88vw, 960px); filter: blur(0.5px);
    pointer-events: none;
  }
  #frame { position: fixed; inset: 0; pointer-events: none; z-index: 6; }
  #frame .pm { position: absolute; border: 1px solid rgba(77,70,57,0.5); }
  #frame .tick { position: absolute; width: 9px; height: 9px; border: 1px solid rgba(77,70,57,0.6); }
  #frame .rt { position: absolute; background: rgba(77,70,57,0.42); }
  #frame .rn {
    position: absolute; font: 9.5px Georgia, serif; letter-spacing: 0.08em;
    color: rgba(77,70,57,0.42);
  }
</style>
</head>
<body>
<canvas id="plate"></canvas>
<canvas id="fog"></canvas>
<canvas id="ink"></canvas>
<div id="frame">
  <div class="pm" style="inset:12px"></div>
  <div class="pm" style="inset:16px;opacity:.5"></div>
  <div class="tick" style="top:12px;left:12px"></div>
  <div class="tick" style="top:12px;right:12px"></div>
  <div class="tick" style="bottom:12px;left:12px"></div>
  <div class="tick" style="bottom:12px;right:12px"></div>
</div>
<script type="module">
/* ============================================================
   THE LOADING PLATE. A sheet that stands in front of the Barzan
   Atlas while it loads: the same village, drawn flat from above
   from the same survey data, in the same hand. Two sentences
   arrive as ink blooming into the paper and leave as ink erased
   from it. Everything here is 2D canvas - nothing on this page
   touches WebGL.
   ============================================================ */

const PAPER = '#f8f6ef';
const INK = [68, 61, 50];          // the pencil, a step darker for small marks
const RED = '#a5301f';
const SPAN = 2200;                 // metres across the shorter side. Wide enough to bring
                                   // the oak masses south and east of the village onto the
                                   // sheet - at 1700 they fell outside and the plate was bare

// The passage, in the two rounds Rebaz asked for.
const ROUNDS = [
  'Long before the Barzanis became an influential political household in modern Iraqi Kurdistan, they were sheikhs in a remote mountain village.',
  'Their authority began in a small Sufi lodge, among poor peasants, rural communities, disciples, and rival tribes.'
];

function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const h2 = (x, y) => { const v = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return v - Math.floor(v); };
function vnoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy;
  const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
  const a = h2(ix, iy), b = h2(ix + 1, iy), c = h2(ix, iy + 1), d = h2(ix + 1, iy + 1);
  return a + (b - a) * ux + ((c + (d - c) * ux) - (a + (b - a) * ux)) * uy;
}

// the page lives at /loading/ next to the atlas's data; the second path serves a
// local checkout where the data still sits under shell/
async function fetchFirst(paths) {
  for (const p of paths) {
    try { const r = await fetch(p); if (r.ok) return await r.json(); } catch (e) { /* try the next */ }
  }
  throw new Error('no data at ' + paths.join(', '));
}
const S = await fetchFirst(['../data/scene.json', '../shell/data/scene.json']);
const VEG = await fetchFirst(['../data/veg.json', '../shell/data/veg.json']);
const T = await fetchFirst(['../data/terrain.json', '../shell/data/terrain.json']);

const town = S.places.find(p => p.t === 'town') ?? S.places[0];
const CX = town.x, CY = town.y;

/* ---------- the plate: drawn once ---------- */
const plate = document.getElementById('plate');
const fogC = document.getElementById('fog');
const DPR = Math.min(1.5, window.devicePixelRatio || 1);   // gentle on the machine
let PW = 0, PH = 0, PXM = 0;
const toothTile = document.createElement('canvas');
toothTile.width = toothTile.height = 256;

const px = wx => (wx - CX) * PXM + PW / 2;
const py = wy => PH / 2 - (wy - CY) * PXM;   // north up

function ringPath(x, ring) {
  x.beginPath();
  x.moveTo(px(ring[0][0]), py(ring[0][1]));
  for (let i = 1; i < ring.length; i++) x.lineTo(px(ring[i][0]), py(ring[i][1]));
  x.closePath();
}
function linePath(x, pts) {
  x.beginPath();
  x.moveTo(px(pts[0][0]), py(pts[0][1]));
  for (let i = 1; i < pts.length; i++) x.lineTo(px(pts[i][0]), py(pts[i][1]));
}
const inkA = a => `rgba(${INK[0]},${INK[1]},${INK[2]},${a})`;

function drawPlate() {
  PW = plate.width = Math.round(innerWidth * DPR);
  PH = plate.height = Math.round(innerHeight * DPR);
  plate.style.width = innerWidth + 'px';
  plate.style.height = innerHeight + 'px';
  PXM = Math.max(PW, PH) / SPAN;
  const x = plate.getContext('2d');
  x.fillStyle = PAPER;
  x.fillRect(0, 0, PW, PH);

  // the tooth of the sheet: one small noise tile, tiled across (kept for the photo
  // plate to reuse)
  const tile = toothTile;
  const tx = tile.getContext('2d');
  const td = tx.createImageData(256, 256);
  for (let i = 0; i < 256 * 256; i++) {
    const gx = i & 255, gy = i >> 8;
    const n = vnoise(gx / 2.3, gy / 2.3) * 0.6 + vnoise(gx / 5.7 + 9.1, gy / 5.7 + 9.1) * 0.4;
    td.data[i * 4] = INK[0]; td.data[i * 4 + 1] = INK[1]; td.data[i * 4 + 2] = INK[2];
    td.data[i * 4 + 3] = n > 0.62 ? (n - 0.62) * 150 : 0;
  }
  tx.putImageData(td, 0, 0);
  x.save();
  x.globalAlpha = 0.5;
  for (let j = 0; j < PH; j += 256) for (let i = 0; i < PW; i += 256) x.drawImage(tile, i, j);
  x.restore();

  const rng = mulberry32(1931);

  // ---- the land itself: contours off the real SRTM grid -------------------------
  // The open ground between the marks needs structure or the sheet reads as blank
  // paper with a village floating on it. The structure is real: contour lines walked
  // out of the same heightmap the atlas stands on, every 30 m, with a hand's wobble.
  {
    const G = T.grid, HTS = T.heights, HMIN = T.min, HMAX = T.max;
    const EW = T.extentW, EH = T.extentH;
    const gx = i => (i / (G - 1) - 0.5) * EW;
    const gy = j => (0.5 - j / (G - 1)) * EH;       // row 0 = north
    x.strokeStyle = inkA(0.11);
    x.lineWidth = 0.7 * DPR;
    const LIM = SPAN * 0.80;
    x.beginPath();
    for (let lv = Math.ceil(HMIN / 30) * 30 + 15; lv < HMAX; lv += 30) {
      for (let j = 0; j < G - 1; j++) {
        const wy0 = gy(j);
        if (Math.abs(wy0 - CY) > LIM) continue;
        for (let i = 0; i < G - 1; i++) {
          const wx0 = gx(i);
          if (Math.abs(wx0 - CX) > LIM) continue;
          const v = [HTS[j * G + i], HTS[j * G + i + 1], HTS[(j + 1) * G + i + 1], HTS[(j + 1) * G + i]];
          const cxs = [wx0, gx(i + 1), gx(i + 1), wx0];
          const cys = [wy0, wy0, gy(j + 1), gy(j + 1)];
          const pts = [];
          for (let e = 0; e < 4; e++) {
            const a = e, b = (e + 1) & 3;
            if ((v[a] - lv) * (v[b] - lv) < 0) {
              const t = (lv - v[a]) / (v[b] - v[a]);
              pts.push([cxs[a] + (cxs[b] - cxs[a]) * t, cys[a] + (cys[b] - cys[a]) * t]);
            }
          }
          if (pts.length >= 2) {
            // the wobble is what keeps this a drawing rather than a plot
            const w0 = (vnoise(pts[0][0] * 0.011, pts[0][1] * 0.011) - 0.5) * 3.2;
            const w1 = (vnoise(pts[1][0] * 0.011, pts[1][1] * 0.011) - 0.5) * 3.2;
            x.moveTo(px(pts[0][0]) + w0, py(pts[0][1]) + w0);
            x.lineTo(px(pts[1][0]) + w1, py(pts[1][1]) + w1);
          }
        }
      }
    }
    x.stroke();
  }

  // ---- worked parcels: hatch runs with each field's own grain -------------------
  (S.farm || []).forEach(poly => {
    let bl = -1, ang = 0, cx = 0, cy = 0;
    poly.forEach((p, i) => {
      const q = poly[(i + 1) % poly.length];
      const l = Math.hypot(q[0] - p[0], q[1] - p[1]);
      if (l > bl) { bl = l; ang = Math.atan2(q[1] - p[1], q[0] - p[0]); }
      cx += p[0] / poly.length; cy += p[1] / poly.length;
    });
    x.save();
    ringPath(x, poly); x.clip();
    x.strokeStyle = inkA(0.15); x.lineWidth = Math.max(0.7, 0.35 * PXM * 0.5);
    const step = 5.2 * DPR, R = SPAN * PXM;
    const ca = Math.cos(ang), sa = Math.sin(ang);
    // canvas y runs south, so the hatch normal flips with it
    for (let o = -R; o < R; o += step) {
      x.beginPath();
      x.moveTo(px(cx) - ca * R + sa * o * (rng() * 0.06 + 0.97), py(cy) + sa * R + ca * o);
      x.lineTo(px(cx) + ca * R + sa * o, py(cy) - sa * R + ca * o);
      x.stroke();
    }
    x.restore();
    x.strokeStyle = inkA(0.12); x.lineWidth = 0.8 * DPR;
    ringPath(x, poly); x.stroke();
  });

  // ---- scrub: sparse stipple -----------------------------------------------------
  (S.scrub || []).forEach(poly => {
    let mnx = 1e9, mxx = -1e9, mny = 1e9, mxy = -1e9;
    poly.forEach(p => { mnx = Math.min(mnx, p[0]); mxx = Math.max(mxx, p[0]);
                        mny = Math.min(mny, p[1]); mxy = Math.max(mxy, p[1]); });
    x.save(); ringPath(x, poly); x.clip();
    const n = Math.min(1600, (mxx - mnx) * (mxy - mny) / 900);
    for (let i = 0; i < n; i++) {
      const wxp = mnx + rng() * (mxx - mnx), wyp = mny + rng() * (mxy - mny);
      x.fillStyle = inkA(0.10 + rng() * 0.08);
      x.beginPath(); x.arc(px(wxp), py(wyp), (0.5 + rng()) * DPR, 0, 6.2832); x.fill();
    }
    x.restore();
  });

  // ---- the wood, from the satellite: lobed crowns where the density says so ------
  const VG = VEG.grid, VD = VEG.dens, VEW = VEG.extentW, VEH = VEG.extentH;
  const stepM = 18;
  for (let wy = CY - SPAN; wy < CY + SPAN; wy += stepM) {
    for (let wx = CX - SPAN; wx < CX + SPAN; wx += stepM) {
      const i = Math.max(0, Math.min(VG - 1, ((wx / VEW + 0.5) * VG) | 0));
      const j = Math.max(0, Math.min(VG - 1, ((0.5 - wy / VEH) * VG) | 0));
      const d = VD[j * VG + i] / 255;
      if (d < 0.18 || rng() > d * 1.3) continue;
      const jx = px(wx + (rng() - 0.5) * stepM), jy = py(wy + (rng() - 0.5) * stepM);
      if (jx < -8 || jy < -8 || jx > PW + 8 || jy > PH + 8) continue;
      const r = (1.3 + rng() * 2.0) * DPR * (0.7 + d * 0.7);
      // dense wood gets a body, not just a rim - this is what gathers the crowns
      // into the dark masses the village reads against
      if (d > 0.45) {
        x.fillStyle = inkA(0.10 + d * 0.14);
        x.beginPath(); x.arc(jx, jy, r * 1.1, 0, 6.2832); x.fill();
      }
      x.strokeStyle = inkA(0.20 + d * 0.24);
      x.lineWidth = 0.7 * DPR;
      // a crown is three small arcs, never a circle
      for (let k = 0; k < 3; k++) {
        const a0 = rng() * 6.28;
        x.beginPath();
        x.arc(jx + (rng() - 0.5) * r * 0.7, jy + (rng() - 0.5) * r * 0.7, r * (0.6 + rng() * 0.5), a0, a0 + 2.4 + rng() * 1.6);
        x.stroke();
      }
    }
  }

  // ---- cliffs: ticks thrown off the line ----------------------------------------
  (S.cliffs || []).forEach(c => {
    x.strokeStyle = inkA(0.26); x.lineWidth = 0.8 * DPR;
    for (let i = 0; i + 1 < c.length; i++) {
      const a = c[i], b = c[i + 1];
      const L = Math.hypot(b[0] - a[0], b[1] - a[1]);
      const n = Math.max(1, Math.round(L / 14));
      for (let k = 0; k < n; k++) {
        const t = k / n;
        const mx = a[0] + (b[0] - a[0]) * t, my = a[1] + (b[1] - a[1]) * t;
        const nx = -(b[1] - a[1]) / L, ny = (b[0] - a[0]) / L;
        x.beginPath();
        x.moveTo(px(mx), py(my));
        x.lineTo(px(mx + nx * 7), py(my + ny * 7));
        x.stroke();
      }
    }
  });

  // ---- water: a double bank ------------------------------------------------------
  const bank = (pts, w, a) => {
    for (const side of [1, -1]) {
      x.strokeStyle = inkA(a); x.lineWidth = 0.9 * DPR;
      x.beginPath();
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i], q = pts[Math.min(i + 1, pts.length - 1)], o = pts[Math.max(i - 1, 0)];
        let dx = q[0] - o[0], dy = q[1] - o[1];
        const L = Math.hypot(dx, dy) || 1; dx /= L; dy /= L;
        const X = px(p[0] - dy * w * side), Y = py(p[1] + dx * w * side);
        i ? x.lineTo(X, Y) : x.moveTo(X, Y);
      }
      x.stroke();
    }
  };
  (S.river || []).forEach(r => bank(r, 4.5, 0.34));
  (S.streams || []).forEach(s => { x.strokeStyle = inkA(0.15); x.lineWidth = 0.7 * DPR; linePath(x, s); x.stroke(); });

  // ---- roads: the Barzan law - a road is only where the drawing stops ------------
  const erase = (ways, w) => {
    x.strokeStyle = PAPER; x.lineCap = 'round'; x.lineJoin = 'round';
    x.lineWidth = w * PXM;
    (ways || []).forEach(way => { linePath(x, way); x.stroke(); });
  };
  erase(S.roadsMajor, 7.5);
  erase(S.roadsMinor, 5.0);
  erase(S.tracks, 3.5);

  // ---- the village ---------------------------------------------------------------
  (S.buildings || []).forEach(b => {
    ringPath(x, b);
    x.fillStyle = inkA(0.62);
    x.fill();
  });

  // ---- the sheet dissolves at its edges, before the fog ever moves --------------
  edgeDissolve(x);
}

function edgeDissolve(x) {
  const g1 = x.createRadialGradient(PW / 2, PH / 2, Math.min(PW, PH) * 0.32, PW / 2, PH / 2, Math.max(PW, PH) * 0.62);
  g1.addColorStop(0, 'rgba(248,246,239,0)');
  g1.addColorStop(1, 'rgba(248,246,239,0.9)');
  x.fillStyle = g1;
  x.fillRect(0, 0, PW, PH);
}

/* ---------- the real plate, when it exists ----------
   The drawn fallback above is data-honest but it is not the atlas. When a cropped
   overhead capture of the atlas itself sits next to this page as plate.jpg, it becomes
   the sheet: laid down as cover, with the same tooth and the same dissolving edges, so
   the fog and the ink ride on the real drawing. If the file is absent nothing changes. */
let plateImg = null;
function drawPhotoPlate() {
  if (!plateImg) return;
  const x = plate.getContext('2d');
  x.fillStyle = PAPER;
  x.fillRect(0, 0, PW, PH);
  const sc = Math.max(PW / plateImg.width, PH / plateImg.height);
  const w = plateImg.width * sc, h = plateImg.height * sc;
  x.drawImage(plateImg, (PW - w) / 2, (PH - h) / 2, w, h);
  // the sheet's own tooth over the capture, so it stays paper rather than photograph
  x.globalAlpha = 0.38;
  for (let j = 0; j < PH; j += 256) for (let i = 0; i < PW; i += 256) x.drawImage(toothTile, i, j);
  x.globalAlpha = 1;
  edgeDissolve(x);
}
{
  const im = new Image();
  im.onload = () => { plateImg = im; drawPhotoPlate(); };
  im.src = 'plate.jpg';
}

/* ---------- the fog: two sheets of haze on separate slow headings ---------- */
let fogTiles = [];
function buildFog() {
  fogC.width = plate.width; fogC.height = plate.height;
  fogC.style.width = plate.style.width; fogC.style.height = plate.style.height;
  fogTiles = [7.3, 41.9].map(seed => {
    const t = document.createElement('canvas');
    t.width = t.height = 256;
    const c = t.getContext('2d');
    const d = c.createImageData(256, 256);
    for (let i = 0; i < 256 * 256; i++) {
      const gx = i & 255, gy = i >> 8;
      // wrapped so the tile drifts without a seam
      const n = (vnoise(gx / 46 + seed, gy / 46 + seed) * 0.62
               + vnoise(gx / 15 + seed * 2.1, gy / 15 + seed * 2.1) * 0.38);
      const a = Math.max(0, (n - 0.44)) * 1.9;
      d.data[i * 4] = 248; d.data[i * 4 + 1] = 246; d.data[i * 4 + 2] = 239;
      d.data[i * 4 + 3] = Math.min(255, a * a * 255);
    }
    c.putImageData(d, 0, 0);
    return t;
  });
}
const T0 = performance.now();
function drawFog(now) {
  const x = fogC.getContext('2d');
  x.clearRect(0, 0, fogC.width, fogC.height);
  const t = (now - T0) / 1000;
  const lift = Math.max(0, 1 - t / 4.5);          // the haze lifts off the plate at open
  const SC = Math.max(fogC.width, fogC.height) * 1.35;
  [[0.55, 3.1, -2.2], [0.45, -2.4, 1.7]].forEach(([al, hx, hy], k) => {
    x.globalAlpha = al * (0.62 + lift * 0.5);
    const ox = (t * hx) % 256, oy = (t * hy) % 256;
    x.drawImage(fogTiles[k], ((ox % 256) + 256) % 256 - 256 + (k ? -SC * 0.1 : 0), ((oy % 256) + 256) % 256 - 256, SC, SC);
  });
  x.globalAlpha = Math.min(0.92, lift * 1.1);
  if (x.globalAlpha > 0.01) { x.fillStyle = PAPER; x.fillRect(0, 0, fogC.width, fogC.height); }
  x.globalAlpha = 1;
  // the one point of colour: Barzan itself, breathing while the atlas loads
  const pulse = 0.45 + 0.30 * Math.sin(t * 1.7);
  x.strokeStyle = RED; x.globalAlpha = pulse * (1 - lift);
  x.lineWidth = 1.6 * DPR;
  x.beginPath(); x.arc(px(CX), py(CY), 11 * DPR, 0, 6.2832); x.stroke();
  x.globalAlpha = 1;
}

/* ---------- the ink: two sentences, bloomed in and erased out ---------- */
const inkC = document.getElementById('ink');
const IW = 680, IH = 250;
inkC.width = IW; inkC.height = IH;
const ictx = inkC.getContext('2d');

// Per round: the glyph alpha map, plus one reveal field for arriving and a different
// one for leaving, so the erase never retraces the bloom.
function buildRound(text, seed) {
  const c = document.createElement('canvas');
  c.width = IW; c.height = IH;
  const x = c.getContext('2d');
  x.fillStyle = '#000';
  x.font = '400 24px Georgia, serif';
  if ('letterSpacing' in x) x.letterSpacing = '1.5px';
  x.textAlign = 'center';
  // wrap
  const words = text.split(' ');
  const lines = [];
  let line = '';
  words.forEach(w => {
    const trial = line ? line + ' ' + w : w;
    if (x.measureText(trial).width > IW - 70 && line) { lines.push(line); line = w; }
    else line = trial;
  });
  lines.push(line);
  const lh = 40, y0 = IH / 2 - (lines.length - 1) * lh / 2 + 8;
  lines.forEach((l, i) => x.fillText(l, IW / 2, y0 + i * lh));
  const glyph = x.getImageData(0, 0, IW, IH);

  const mk = off => {
    const f = new Float32Array(IW * IH);
    for (let j = 0; j < IH; j++) for (let i = 0; i < IW; i++) {
      f[j * IW + i] = vnoise(i / 88 + seed + off, j / 88 + seed + off) * 0.62
                    + vnoise(i / 21 + seed * 3 + off, j / 21 + seed * 3 + off) * 0.38;
    }
    // normalise so the sweep always covers 0..1
    let mn = 1e9, mx = -1e9;
    for (let i = 0; i < f.length; i++) { if (f[i] < mn) mn = f[i]; if (f[i] > mx) mx = f[i]; }
    for (let i = 0; i < f.length; i++) f[i] = (f[i] - mn) / (mx - mn);
    return f;
  };
  return { glyph, inField: mk(0), outField: mk(17.7) };
}
const roundData = ROUNDS.map((t, i) => buildRound(t, 5.1 + i * 9.7));
const frame = ictx.createImageData(IW, IH);

function paintInk(rd, reveal, field) {
  // reveal sweeps 0->1.25; a pixel holds full ink once the sweep has passed its
  // noise value by the feather width. The feather is the wet edge.
  const F = 0.22, g = rd.glyph.data, o = frame.data;
  for (let i = 0; i < IW * IH; i++) {
    const a = g[i * 4 + 3];
    if (!a) { o[i * 4 + 3] = 0; continue; }
    let m = (reveal - field[i]) / F;
    m = m < 0 ? 0 : m > 1 ? 1 : m;
    m = m * m * (3 - 2 * m);
    o[i * 4] = INK[0]; o[i * 4 + 1] = INK[1]; o[i * 4 + 2] = INK[2];
    o[i * 4 + 3] = a * m;
  }
  ictx.putImageData(frame, 0, 0);
}

/* ---------- the clock ---------- */
const IN = 2600, HOLD = 4800, OUT = 2100, GAP = 1100, OPEN = 2200;
const CYCLE = IN + HOLD + OUT + GAP;
let heldRound = -1;

function tick(now) {
  drawFog(now);
  const t = now - T0;
  if (t > OPEN) {
    const tt = (t - OPEN) % (CYCLE * ROUNDS.length);
    const r = Math.floor(tt / CYCLE), lt = tt - r * CYCLE;
    const rd = roundData[r];
    if (lt < IN) {
      paintInk(rd, (lt / IN) * 1.25, rd.inField); heldRound = -1;
    } else if (lt < IN + HOLD) {
      if (heldRound !== r) { paintInk(rd, 1.25, rd.inField); heldRound = r; }
    } else if (lt < IN + HOLD + OUT) {
      paintInk(rd, (1 - (lt - IN - HOLD) / OUT) * 1.25, rd.outField); heldRound = -1;
    } else if (heldRound !== -9) {
      ictx.clearRect(0, 0, IW, IH); heldRound = -9;
    }
  }
  requestAnimationFrame(tick);
}

drawPlate();
buildFog();
let rsz;
addEventListener('resize', () => { clearTimeout(rsz); rsz = setTimeout(() => { drawPlate(); drawPhotoPlate(); buildFog(); }, 250); });
requestAnimationFrame(tick);
</script>
