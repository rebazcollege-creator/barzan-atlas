<div id="loader"><canvas id="ldC"></canvas><canvas id="ldInk"></canvas></div>
<script>
/* ============================================================
   THE LOADING SHEET. Bare paper carrying two sentences of the
   Barzani research while the atlas loads beneath it. The texts
   arrive as ink blooming into the paper and leave as ink erased
   from it; when the second has gone AND the atlas has drawn its
   first frames, the sheet itself is erased the same way and the
   living map is simply there. Plain script, plain canvas: it is
   on screen before the module starts fetching data.
   ============================================================ */
(function () {
  // ?plate is the capture stance; ?map is the clean entrance - the living atlas with
  // no sheet, no cuts, no flight, for visitors who have already seen the opening.
  var q = new URLSearchParams(location.search);
  if (q.has('plate') || q.has('map')) {
    document.getElementById('loader').remove();
    if (q.has('map')) window.__skipIntro = true;
    return;
  }
  var L = document.getElementById('loader');
  var C = document.getElementById('ldC');
  var K = document.getElementById('ldInk');
  var DPR = Math.min(2, window.devicePixelRatio || 1);
  var PAPER = '#f8f6ef', TINK = [48, 42, 33];
  // One register only, at Rebaz's direction: every line in the style of LONG
  // BEFORE - IM Fell English roman, letterspaced capitals, 27px - and no rules.
  var ROUNDS = [
    [ { k: 'c', t: 'Long before the Barzanis became', s: 27 },
      { k: 'c', t: 'an influential political household', s: 27 },
      { k: 'c', t: 'in modern Iraqi Kurdistan,', s: 27 } ],
    [ { k: 'c', t: 'they were sheikhs in', s: 27 },
      { k: 'c', t: 'a remote mountain village.', s: 27 } ],
    [ { k: 'c', t: 'Their authority began in', s: 27 },
      { k: 'c', t: 'a small Sufi lodge,', s: 27 } ],
    [ { k: 'c', t: 'among poor peasants,', s: 27 },
      { k: 'c', t: 'rural communities, disciples,', s: 27 },
      { k: 'c', t: 'and rival tribes.', s: 27 } ]
  ];
  function h2(x, y) { var v = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return v - Math.floor(v); }
  function vn(x, y) {
    var ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy;
    var ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
    var a = h2(ix, iy), b = h2(ix + 1, iy), c = h2(ix, iy + 1), d = h2(ix + 1, iy + 1);
    return a + (b - a) * ux + ((c + (d - c) * ux) - (a + (b - a) * ux)) * uy;
  }

  // the sheet's tooth: the same recipe as the map's own paper
  var tile = document.createElement('canvas'); tile.width = tile.height = 256;
  (function () {
    var tx = tile.getContext('2d'), td = tx.createImageData(256, 256);
    for (var i = 0; i < 65536; i++) {
      var gx = i & 255, gy = i >> 8;
      var nv = vn(gx / 2.3, gy / 2.3) * 0.6 + vn(gx / 5.7 + 9.1, gy / 5.7 + 9.1) * 0.4;
      td.data[i * 4] = 68; td.data[i * 4 + 1] = 61; td.data[i * 4 + 2] = 50;
      td.data[i * 4 + 3] = nv > 0.62 ? (nv - 0.62) * 150 : 0;
    }
    tx.putImageData(td, 0, 0);
  })();
  var W, H;
  function size() {
    W = C.width = Math.round(innerWidth * DPR); H = C.height = Math.round(innerHeight * DPR);
    C.style.width = innerWidth + 'px'; C.style.height = innerHeight + 'px';
  }
  size(); addEventListener('resize', size);

  // the erase field, held small: upscaling is what makes the holes watery
  var MW = 384, MH = Math.max(2, Math.round(MW * innerHeight / Math.max(1, innerWidth)));
  var mask = document.createElement('canvas'); mask.width = MW; mask.height = MH;
  var mx2 = mask.getContext('2d'), mimg = mx2.createImageData(MW, MH);
  var mfield = new Float32Array(MW * MH);
  (function () {
    var mn = 1e9, mx = -1e9, i, j, v;
    for (j = 0; j < MH; j++) for (i = 0; i < MW; i++) {
      v = vn(i / 64 + 3.7, j / 64 + 3.7) * 0.62 + vn(i / 15 + 11.1, j / 15 + 11.1) * 0.38;
      mfield[j * MW + i] = v; if (v < mn) mn = v; if (v > mx) mx = v;
    }
    for (i = 0; i < mfield.length; i++) mfield[i] = (mfield[i] - mn) / (mx - mn);
  })();

  function drawPaper(wipe) {
    var x = C.getContext('2d');
    x.globalCompositeOperation = 'source-over';
    x.fillStyle = PAPER; x.fillRect(0, 0, W, H);
    x.globalAlpha = 0.5;
    for (var j = 0; j < H; j += 256) for (var i = 0; i < W; i += 256) x.drawImage(tile, i, j);
    x.globalAlpha = 1;
    if (wipe > 0) {
      var F = 0.20, o = mimg.data, r = wipe * 1.25, k, m;
      for (k = 0; k < MW * MH; k++) {
        m = (r - mfield[k]) / F; m = m < 0 ? 0 : m > 1 ? 1 : m; m = m * m * (3 - 2 * m);
        o[k * 4 + 3] = m * 255;
      }
      mx2.putImageData(mimg, 0, 0);
      x.globalCompositeOperation = 'destination-out';
      x.drawImage(mask, 0, 0, W, H);
      x.globalCompositeOperation = 'source-over';
    }
  }

  // the ink, at DEVICE resolution: the glyphs render at retina scale and the reveal
  // is a small noise mask composited over them, so the letters never blur
  var IW = 1020, IH = 430, KS = Math.min(2, window.devicePixelRatio || 1);
  K.width = IW * KS; K.height = IH * KS;
  var kctx = K.getContext('2d');
  var MWF = 320, MHF = 135;
  var maskC = document.createElement('canvas'); maskC.width = MWF; maskC.height = MHF;
  var mkx = maskC.getContext('2d'), mImg = mkx.createImageData(MWF, MHF);
  function buildRound(lines, seed) {
    var c = document.createElement('canvas'); c.width = IW * KS; c.height = IH * KS;
    var x = c.getContext('2d');
    x.scale(KS, KS);
    x.fillStyle = 'rgb(' + TINK[0] + ',' + TINK[1] + ',' + TINK[2] + ')';
    x.textAlign = 'center';
    var canLS = 'letterSpacing' in x;
    function setLine(ln) {
      var sz = ln.s, ls = ln.k === 'c' ? sz * 0.34 : 0.5, txt = ln.k === 'c' ? ln.t.toUpperCase() : ln.t;
      for (;;) {
        x.font = (ln.k === 'c' ? '400 ' : 'italic 400 ') + sz + 'px "IM Fell English", Georgia, serif';
        if (canLS) x.letterSpacing = ls + 'px';
        if (x.measureText(txt).width <= IW - 80 || sz <= 18) break;
        sz -= 2; ls = ln.k === 'c' ? sz * 0.34 : 0.5;
      }
      return { txt: txt, lh: Math.round(sz * (ln.k === 'c' ? 1.55 : 1.35)), ls: ls };
    }
    // measure the stack, then centre it - no rules, at Rebaz's direction
    var hgt = 0, mets = [];
    for (var li = 0; li < lines.length; li++) { var m = setLine(lines[li]); mets.push(m); hgt += m.lh; }
    var y = (IH - hgt) / 2;
    for (li = 0; li < lines.length; li++) {
      var m2 = setLine(lines[li]);
      // trailing tracking after the last capital shifts a centred line; compensate
      x.fillText(m2.txt, IW / 2 + m2.ls / 2, y + m2.lh * 0.72);
      y += m2.lh;
    }
    function mk(off) {
      // the reveal field lives at mask resolution; the spatial frequency matches the
      // old full-resolution field (1020/320 = 3.19 scale factor folded in)
      var f2 = new Float32Array(MWF * MHF), i, j, mn = 1e9, mx = -1e9, v;
      for (j = 0; j < MHF; j++) for (i = 0; i < MWF; i++) {
        v = vn(i / 41.4 + seed + off, j / 41.4 + seed + off) * 0.62
          + vn(i / 9.7 + seed * 3 + off, j / 9.7 + seed * 3 + off) * 0.38;
        f2[j * MWF + i] = v; if (v < mn) mn = v; if (v > mx) mx = v;
      }
      for (i = 0; i < f2.length; i++) f2[i] = (f2[i] - mn) / (mx - mn);
      return f2;
    }
    return { tex: c, inField: mk(0), outField: mk(17.7) };
  }
  var roundData = null, accB = 0;
  function buildAll() {
    if (roundData) return;
    // ONLY the first cut is built up front - a quarter of the cost, so the first
    // ink is on paper as early as it can be. The rest are staged behind it, long
    // before their turns come round.
    roundData = [buildRound(ROUNDS[0], 5.1), null, null, null];
    accB = acc;
    setTimeout(function () { roundData[1] = buildRound(ROUNDS[1], 14.8); }, 450);
    setTimeout(function () { roundData[2] = buildRound(ROUNDS[2], 23.3); }, 1000);
    setTimeout(function () { roundData[3] = buildRound(ROUNDS[3], 31.9); }, 1550);
  }
  // as soon as it can: the moment the face is resident, or 500 ms if it stalls
  Promise.race([
    document.fonts.load('400 27px "IM Fell English"'),
    new Promise(function (res) { setTimeout(res, 300); })
  ]).then(buildAll, buildAll);
  function paintInk(rd, reveal, field) {
    var F = 0.22, o = mImg.data, i, m;
    for (i = 0; i < MWF * MHF; i++) {
      m = (reveal - field[i]) / F; m = m < 0 ? 0 : m > 1 ? 1 : m; m = m * m * (3 - 2 * m);
      o[i * 4 + 3] = m * 255;
    }
    mkx.putImageData(mImg, 0, 0);
    kctx.clearRect(0, 0, K.width, K.height);
    kctx.drawImage(rd.tex, 0, 0);
    kctx.globalCompositeOperation = 'destination-in';
    kctx.imageSmoothingEnabled = true;
    kctx.drawImage(maskC, 0, 0, K.width, K.height);
    kctx.globalCompositeOperation = 'source-over';
  }

  // THE CLOCK SURVIVES THE BUILD. The atlas assembles synchronously in big blocks
  // during the first seconds, and every stall froze the paint while the wall clock
  // ran on - round one lost most of its IN and HOLD to a freeze it never saw. The
  // choreography now advances on an accumulator credited at most 120 ms per frame:
  // a two-second stall costs the animation 120 ms, and every sentence lives its
  // full life whatever the machine is doing.
  // the skip: one quiet engraved line. It releases the module's text-first wait
  // (__ink1), forbids the flight (__skipIntro), seats the camera at the landing
  // stance with the ink-in reveal, and opens the sheet at once.
  var skipBtn = document.createElement('button');
  skipBtn.id = 'ldSkip';
  skipBtn.textContent = 'skip the intro';
  L.appendChild(skipBtn);
  var skipping = false;
  skipBtn.addEventListener('click', function () {
    if (skipping) return;
    skipping = true;
    window.__skipIntro = true;
    window.__ink1 = true;
    var go = function () {
      if (window.__goRestStance) window.__goRestStance();
      if (wipeAcc < 0) { wipeAcc = acc; window.__loaderWipeAt = true; }
    };
    if (window.__atlasReady) go();
    else {
      skipBtn.textContent = 'preparing the map';
      var w8 = setInterval(function () {
        if (window.__atlasReady) { clearInterval(w8); go(); }
      }, 120);
    }
  });

  var T0 = performance.now(), last = T0, acc = 0;
  var IN = 1800, HOLD = 2600, OUT = 1500, GAP = 500, OPEN = 150;
  var CYCLE = IN + HOLD + OUT + GAP, WIPE = 2600, HARD = 45000;
  var wipeAcc = -1, done = false, heldRound = -1;
  function tick(now) {
    if (done) return;
    var t = now - T0;
    acc += Math.min(now - last, 120); last = now;
    // four cuts, each run ONCE; after the last has erased, the sheet waits only
    // for the atlas (a hard timeout guards a failed load from trapping the page)
    var tv = roundData ? acc - accB + OPEN : -1;
    var textsDone = roundData && tv > OPEN + CYCLE * 4 - GAP;
    if (wipeAcc < 0) {
      drawPaper(0);
      if (roundData && tv > OPEN && !textsDone) {
        var tt = tv - OPEN, r = Math.min(3, Math.floor(tt / CYCLE)), lt = tt - r * CYCLE, rd = roundData[r];
        if (!rd) { /* still staging; its turn is not yet */ }
        else if (lt < IN) { paintInk(rd, lt / IN * 1.25, rd.inField); heldRound = -1; }
        else if (lt < IN + HOLD) {
          if (heldRound !== r) {
            paintInk(rd, 1.25, rd.inField); heldRound = r;
            if (r === 0) window.__ink1 = true;   // the module may begin its build now
          }
        }
        else if (lt < IN + HOLD + OUT) { paintInk(rd, (1 - (lt - IN - HOLD) / OUT) * 1.25, rd.outField); heldRound = -1; }
        else if (heldRound !== -9) { kctx.clearRect(0, 0, K.width, K.height); heldRound = -9; }
      }
      if (textsDone && (window.__atlasReady || t > HARD)) {
        wipeAcc = acc;
        window.__loaderWipeAt = true;   // the atlas begins its approach as the sheet opens
      }
    } else {
      var w = (acc - wipeAcc) / WIPE;
      if (w >= 1) { done = true; L.remove(); return; }
      drawPaper(w);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
<script type="importmap">

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/OrbitControls.js';
import { mergeGeometries } from './vendor/BufferGeometryUtils.js';

/* ============================================================
   BARZAN on the prototype pipeline. Everything proto.html
   proved, scaled to metres and fed with the real survey data:
   721 building footprints, the road network, the Great Zab,
   farm polygons, SRTM relief. Same law throughout: the page
   is paper, and pencil lands only where the data channels say.
   ============================================================ */

const [T, S, VEG] = await Promise.all([
  fetch('./data/terrain.json').then(r => r.json()),
  fetch('./data/scene.json').then(r => r.json()),
  fetch('./data/veg.json').then(r => r.json())
]);

// THE TEXT GOES FIRST. The heavy synchronous build below is what stalled the opening
// sentence: it froze the page mid-bloom. So the module waits - until the first cut is
// standing (the loader raises __ink1 when round one reaches its hold), or 2.6 s at the
// outside - and only then starts hammering the main thread. The stalls then land inside
// the HOLD, where nothing moves and a stall cannot be seen.
await new Promise(resolve => {
  const t0 = performance.now();
  (function wait() {
    (window.__ink1 || performance.now() - t0 > 2600) ? resolve() : setTimeout(wait, 50);
  })();
});

const G = T.grid, HMIN = T.min, W = S.extentW, H = S.extentH, EXAG = 1.12;
const HTS = T.heights;
function sampleH(x, yN) {
  let i = (x / W + 0.5) * (G - 1), j = (0.5 - yN / H) * (G - 1);
  i = Math.max(0, Math.min(G - 1.001, i)); j = Math.max(0, Math.min(G - 1.001, j));
  const i0 = i | 0, j0 = j | 0, fx = i - i0, fy = j - j0;
  const h00 = HTS[j0 * G + i0], h10 = HTS[j0 * G + i0 + 1];
  const h01 = HTS[(j0 + 1) * G + i0], h11 = HTS[(j0 + 1) * G + i0 + 1];
  return ((h00 * (1 - fx) + h10 * fx) * (1 - fy) + (h01 * (1 - fx) + h11 * fx) * fy - HMIN) * EXAG;
}

// REAL vegetation from the satellite (data/veg.json), sampled in world coords
const VG = VEG.grid, VEW = VEG.extentW, VEH = VEG.extentH, VD = VEG.dens;
function sampleVeg(wx, wz) {
  let i = (wx / VEW + 0.5) * VG, j = (wz / VEH + 0.5) * VG;
  i = Math.max(0, Math.min(VG - 1, i | 0)); j = Math.max(0, Math.min(VG - 1, j | 0));
  return VD[j * VG + i] / 255;
}

const townP = S.places.find(p => p.t === 'town') ?? S.places[0];
const CX = townP.x, CZ = -townP.y; // world centre = Barzan itself
const SPAN = 2500;                 // ONE Barzan: village + valley. 5120px/2500m = 2.05 px/m,
                                   // above Chartogne's ~1.7 — attention per pixel is the point
// ?plate — the capture stance: straight overhead, north up, every instrument hidden,
// no label, no ash, no lens fog. Exists so a screenshot of this page IS the flat plate
// the loading sheet needs, at full renderer resolution with nothing to patch out.
const PLATE = new URLSearchParams(location.search).has('plate');

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ---------- palette + metre-tuned parameters ---------- */

const P = {
  paper:  [0.973, 0.963, 0.936],   // #f8f6ef — a much whiter, lighter sheet
  pencil: [0.44, 0.41, 0.35],      // paler grey-brown -> Chartogne's faded pencil
  lightDir: new THREE.Vector3(-0.78, 0.40, 0.48).normalize(),   // low and lateral: one wall
                                                                // is truly lit, the other truly in shade
  strokeDir: new THREE.Vector3(1.0, 1.35, 0.45).normalize(),
  subdivision: 1.75,       // lines/metre on walls — their measured pitch. Countable marks
                           // read as DRAWN; sub-pixel marks read as shaded (audit root cause 1)
  strokeLightOffset: -0.7,  // their shader08 pairing: lit faces are paper,
  strokeLightMultiplier: 3.0, // shade faces snap to near-solid ink
  strokeTreshold: 0.82,
  softShade: 0.12,
  lodOffset: 1200.0,       // metres: strokes carry to the hero range (1-3 km)
  lodAmplitude: 1000.0,
  lineWidth: 1.15,         // a much finer nib — their pencil is thin, ours was a marker
  edgeTreshold: 0.20,
  noiseStrength: 0.04,
  inkTint: 0.62,        // how much of the wash the printed line itself takes
  inkDepth: 0.58,       // the wash, at ink depth
  wash: 1.00,           // master strength of the colour; per-class restraint lives in PIG
  inkCeiling: 0.80,    // the darkest mark on the sheet — never solid ink
  ashInk:    0.46,
  birdInk:   0.85,   // the gulls: two strokes, a shade firmer than the ash   // weight of a single ash flake's ink
  cloudInk:  0.62,   // weight of the drawn cloud line work in the sky
  fogRoll:   0.36,   // how far the drifting edge wanders from a plain circle

const DATA_VERT = /* glsl */`
  uniform float uTime;
  uniform float uWindAmp;
  attribute float aTone;
  attribute float aSolid;
  attribute float aMat;
  varying float vTone;
  varying float vSolid;
  varying float vMat;
  varying vec3 vModelPos;
  varying vec3 vWorldPos;
  varying vec3 vNormalV;
  varying vec3 vNormalW;
  varying float vDepth;
  varying float vPhase;
  void main() {
    vModelPos = position;
    vTone = aTone;
    vSolid = aSolid;
    vMat = aMat;
    vPhase = 0.0;
    vec3 objNormal = normal;
    vec3 objPos = position;
    #ifdef USE_INSTANCING
      objNormal = mat3(instanceMatrix) * objNormal;
      objPos = (instanceMatrix * vec4(objPos, 1.0)).xyz;
      // each instance draws with its own hand: stroke phase never aligns
      vPhase = fract(instanceMatrix[3][0] * 0.731 + instanceMatrix[3][2] * 0.377);
      float wf = clamp(position.y * 0.25 + 0.5, 0.0, 1.0) * uWindAmp;
      // A SWELL crossing the sea: a long wavelength (~500 m) so whole groves lean
      // together as one body, plus a short ripple so no two trees are identical.
      float swell  = sin(uTime * 0.40 + instanceMatrix[3][0] * 0.0115 + instanceMatrix[3][2] * 0.0090);
      float swell2 = cos(uTime * 0.31 + instanceMatrix[3][0] * 0.0082 - instanceMatrix[3][2] * 0.0126);
      float ripple = sin(uTime * 1.45 + instanceMatrix[3][0] * 0.13 + instanceMatrix[3][2] * 0.11);
      objPos.x += (swell  * 0.92 + ripple * 0.34) * wf;
      objPos.z += (swell2 * 0.84 + ripple * 0.30) * wf * 0.85;
    #endif
    vWorldPos = (modelMatrix * vec4(objPos, 1.0)).xyz;
    vNormalV = normalMatrix * objNormal;
    vNormalW = (modelMatrix * vec4(objNormal, 0.0)).xyz;
    vec4 mv = modelViewMatrix * vec4(objPos, 1.0);
    vDepth = -mv.z;
    gl_Position = projectionMatrix * mv;
  }
`;

const DATA_FRAG = /* glsl */`
  uniform float uTone;
  uniform float uToneGrad;
  uniform float uGradY0;
  uniform float uGradY1;
  uniform vec3 uLightDir;
  uniform vec3 uStrokeDirection;
  uniform float uSubdivision;
  uniform float uBoilT;
  uniform float uStrokeLightOffset;
  uniform float uStrokeLightMultiplier;
  uniform float uStrokeTreshold;
  uniform float uSoftShade;
  uniform float uSoftGate0;
  uniform float uSoftGate1;
  uniform float uLodOffset;
  uniform float uLodAmplitude;
  uniform float uDepthScale;
  uniform float uFlat;
  varying float vTone;
  varying float vSolid;
  varying float vMat;
  varying vec3 vModelPos;
  varying vec3 vNormalV;
  varying vec3 vNormalW;
  varying float vDepth;
  varying float vPhase;

  float h2(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float vnoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(mix(h2(i), h2(i + vec2(1, 0)), u.x),
               mix(h2(i + vec2(0, 1)), h2(i + vec2(1, 1)), u.x), u.y);
  }

  // ---- WHAT THE WALL IS MADE OF ------------------------------------------------
  // Parallel hatching says 'a surface in shade'. It does not say block, or mud, or
  // stone. These do. Each returns ink coverage in 0..1, and the in-plane axes are
  // picked from the face normal so a pattern never smears around a corner.
  float matPattern(float m, vec3 pos, vec3 nrm) {
    vec3 an = abs(nrm);
    vec2 uv = an.y > max(an.x, an.z) ? pos.xz : (an.x > an.z ? pos.zy : pos.xy);
    if (m < 1.5) {
      // CONCRETE BLOCK in running bond: 40 x 20 cm, every other course offset by half
      // a block. The later UN-Habitat rebuild, most of what stands at Barzan today.
      float cy = uv.y / 0.42, row = floor(cy);
      float fx = fract(uv.x / 0.84 + mod(row, 2.0) * 0.5), fy = fract(cy);
      float jh = smoothstep(0.085, 0.0, min(fy, 1.0 - fy));
      float jv = smoothstep(0.065, 0.0, min(fx, 1.0 - fx));
      return max(jh, jv * 0.70) * (0.70 + vnoise(uv * 5.0) * 0.55);
    }
    if (m < 2.5) {
      // MUD PLASTER over the spindar houses: not one straight line anywhere. Blotchy,
      // unevenly weathered, and darker at the foot where the damp climbs the wall.
      float b = vnoise(uv * 1.6) * 0.62 + vnoise(uv * 5.1 + 8.1) * 0.38;
      float damp = smoothstep(1.5, -0.5, pos.y) * 0.55;
      return smoothstep(0.54, 0.88, b) * 0.85 + damp * smoothstep(0.35, 0.75, vnoise(uv * 3.0));
    }
    // RUBBLE STONE, dry-laid and uncoursed — the older tradition, sorted off the site
    // and fitted without mortar. Crooked closed joints from three offset noise fields,
    // far cheaper than a real Voronoi and indistinguishable at this size.
    vec2 c = uv * 1.05;
    float a = vnoise(c), b2 = vnoise(c + 3.7), d = vnoise(c * 2.2 + 11.0);
    return smoothstep(0.30, 0.05, abs(a - b2) + abs(b2 - d) * 0.6);
  }

  float getPencilStrength(float baseStrength, vec3 pos, float phase) {
    float b = (baseStrength + uStrokeLightOffset) * uStrokeLightMultiplier;
    float s = distance(pos, uStrokeDirection * 1000.0);
    vec2 np = vec2(dot(pos, vec3(0.83, 0.31, 0.55)), dot(pos, vec3(-0.4, 0.9, 0.2)));
    s += (vnoise(np * 0.8) - 0.5) * 0.14;     // the hand wavers
    // LINE BOIL: the plate is re-drawn a couple of times a second and never twice
    // the same - the oldest hand-animation life there is. The time is QUANTISED, so
    // strokes sit still between redraws instead of swimming.
    s += (vnoise(np * 2.6 + uBoilT) - 0.5) * 0.11;
    b += (vnoise(np * 1.3 + uBoilT * 1.7) - 0.5) * 0.09;
    b += (vnoise(np * 1.75 + 13.7) - 0.5) * 0.26; // pressure varies
    s = s * uSubdivision + phase;
    s = abs(mod(s, 1.0) - 0.5) * 2.0;
    s += b;
    s = clamp(s, 0.0, 1.0);
    s = pow(s, 0.34); // softer gradation — hard binary made the crowns read as cut crystal
    return s * uStrokeTreshold;
  }

  void main() {
    float normalStrength = normalize(vNormalV).x * 0.5 + 0.5;
    float light = clamp(dot(normalize(vNormalW), uLightDir), 0.0, 1.0) * 0.80 + 0.20;
    float toneEff = (uTone + vTone) * (1.0 - uToneGrad * (1.0 - smoothstep(uGradY0, uGradY1, vModelPos.y)));
    toneEff *= 0.80 + vPhase * 0.42;   // every instance its own value — kills the cloned look
    float baseStrength = 1.0 - toneEff * light;
    float stroke = getPencilStrength(baseStrength, vModelPos, vPhase);
    float shade = smoothstep(0.28, 0.78, baseStrength);
    if (uFlat > 0.5) {
      // NO ruled hatching on a building, on any face. The tone that keeps the village
      // reading as a mass is carried by a DIRECTIONLESS grain instead, so a wall reads
      // as a surface rather than as a set of diagonal lines laid over one.
      float g = 0.13 + vnoise(vModelPos.xz * 6.5 + vec2(vModelPos.y * 2.4)) * 0.15;
      stroke = g * shade * uStrokeTreshold;
    }
    if (vMat > 0.5) {
      // and where the surface is a known material, that becomes the mark. It still
      // burns off in the sun, so one face of every house stays empty.
      float mp = matPattern(vMat, vModelPos, normalize(vNormalW));
      stroke = max(stroke, mp * shade * uStrokeTreshold);
    }
    float strokeStrength = 1.0 - clamp((vDepth - uLodOffset) / uLodAmplitude, 0.0, 1.0);
    float soft = clamp(baseStrength, 0.0, 1.0) * uSoftShade * smoothstep(uSoftGate0, uSoftGate1, baseStrength);
    float pencil = max(stroke * strokeStrength, soft);
    pencil = max(pencil, vSolid * 0.78 * max(strokeStrength, 0.4)); // doors, windows
    float depth = 1.0 - clamp(vDepth * uDepthScale, 0.0, 1.0);
    gl_FragColor = vec4(normalStrength, pencil, depth, 0.0);
  }
`;

const DATA_MATS_ALL = [];   // every plate material, for the boil clock
function dataMaterial(tone, opts = {}) {
  const __m = __dataMaterialInner(tone, opts);

      uTime: { value: 0 },

      uToneGrad: { value: opts.toneGrad ?? 0 },
      uGradY0: { value: opts.gradY0 ?? 0 },
      uGradY1: { value: opts.gradY1 ?? 1 },
      uLightDir: { value: P.lightDir },
      uStrokeDirection: { value: opts.strokeDir ?? P.strokeDir },
      uSubdivision: { value: opts.subdivision ?? P.subdivision },
      uStrokeLightOffset: { value: opts.strokeOffset ?? P.strokeLightOffset },
      uStrokeLightMultiplier: { value: opts.strokeMult ?? P.strokeLightMultiplier },
      uStrokeTreshold: { value: opts.strokeTreshold ?? P.strokeTreshold },
      uSoftShade: { value: opts.softShade ?? P.softShade },
      uSoftGate0: { value: opts.softGate0 ?? 0.55 },
      uSoftGate1: { value: opts.softGate1 ?? 0.8 },
      uLodOffset: { value: opts.lodOffset ?? P.lodOffset },
      uLodAmplitude: { value: opts.lodAmplitude ?? P.lodAmplitude },
      uDepthScale: { value: P.depthScale },
      uFlat: { value: opts.flat ?? 0 }

}

};const TEXN = 5120, PXM = TEXN / SPAN; // 2.05 px per metre
let pigmentCanvas = null;
let standCanvas = null;
const wu = wx => (wx - CX) / SPAN + 0.5;
const wv = wz => (wz - CZ) / SPAN + 0.5;
const cxp = wx => wu(wx) * TEXN;
const cyp = wz => wv(wz) * TEXN;
// scene coords -> canvas (scene y is -world z)
const sx = p => cxp(p[0]);
const sy = p => cyp(-p[1]);

function buildMarks() {
  const c = document.createElement('canvas');
  c.width = c.height = TEXN;
  const x = c.getContext('2d');
  x.fillStyle = '#000';
  x.fillRect(0, 0, TEXN, TEXN);
  const rng = mulberry32(7);
  const red = a => `rgba(255,0,0,${a})`;

  // no tooth pass: paper grain lives in the composite, never in the marks.
  // every mark below is ONE flat ink; tone is made by density (their law).

  function pathPoly(poly) {
    x.beginPath();
    poly.forEach((p, k) => k ? x.lineTo(sx(p), sy(p)) : x.moveTo(sx(p), sy(p)));
    x.closePath();
  }

  // --- parcel geometry (C1): the land is a tiled fabric, seams are absence ---
  function clipHalf(poly, px2, py2, nx, ny) {
    const out = [];
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i], b = poly[(i + 1) % poly.length];
      const da = (a[0] - px2) * nx + (a[1] - py2) * ny;
      const db = (b[0] - px2) * nx + (b[1] - py2) * ny;
      if (da <= 0) out.push(a);
      if ((da < 0) !== (db < 0)) {
        const t = da / (da - db);
        out.push([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t]);

    return out;
  }
  function polyCentroid(poly) {
    let cx2 = 0, cy2 = 0;
    poly.forEach(p => { cx2 += p[0]; cy2 += p[1]; });
    return [cx2 / poly.length, cy2 / poly.length];
  }
  function polySpan(poly) {
    let mnx = 1e9, mny = 1e9, mxx = -1e9, mxy = -1e9;
    poly.forEach(p => {
      mnx = Math.min(mnx, p[0]); mxx = Math.max(mxx, p[0]);
      mny = Math.min(mny, p[1]); mxy = Math.max(mxy, p[1]);

  function splitParcel(poly, rngS, depth = 0) {

    if (polySpan(poly) < 150 || depth >= 3 || rngS() < 0.18 * depth) return [poly];
    const [cx2, cy2] = polyCentroid(poly);
    const a = rngS() * Math.PI;

      ...splitParcel(clipHalf(poly, px2, py2, -nx, -ny), rngS, depth + 1)

  const tRng = mulberry32(31);

    const gy2 = sampleH(wx, sy2 + e) - sampleH(wx, sy2 - e);

  // tile DIFFERENT ground and no two mark systems ever stack. Mountains and the
  // village interior carry NO ground ink (relief is the terrain shader; the town
  // is roofs on bare paper). Quiet paper is the large default. This replaces the

  // that is how terraces are actually ploughed. Neighbouring parcels then agree

  function parcelAngleAt(wx, sy2) {

  // A settlement is its OUTLINE, not a circle around it. Testing a circle of
  // (max radius + 200 m) blanketed up to 891 m of pure forest per village and was
  // deleting 89% of the eastern woodland. The circle survives only as a cheap
  // reject; the polygon itself decides.
  // THE VILLAGE IS WHERE THE HOUSES ARE. 42% of Barzan's buildings fall outside
  // the residential landuse polygons, so a mask built from those polygons alone
  // left half the village unprotected and the wood grew through its streets.
  // This mask follows the actual roofs, via a grid hash so it stays cheap.
  const BCELL = 60, bGrid = new Map(), VILLAGE_R = 40;
  S.buildings.forEach(poly => {
    let bx = 0, by = 0;
    poly.forEach(p => { bx += p[0]; by += p[1]; });
    bx /= poly.length; by /= poly.length;
    const k = Math.floor(bx / BCELL) + ',' + Math.floor(by / BCELL);
    let a = bGrid.get(k); if (!a) { a = []; bGrid.set(k, a); }
    a.push([bx, by]);
  });
  const nearHouse = (wx, wy2) => {
    const ci = Math.floor(wx / BCELL), cj = Math.floor(wy2 / BCELL);
    for (let i = ci - 1; i <= ci + 1; i++)
      for (let j = cj - 1; j <= cj + 1; j++) {
        const a = bGrid.get(i + ',' + j);
        if (!a) continue;
        for (let k = 0; k < a.length; k++)
          if ((a[k][0] - wx) ** 2 + (a[k][1] - wy2) ** 2 < VILLAGE_R * VILLAGE_R) return true;
      }
    return false;
  };
  const resHulls = S.residential.map(poly => {
    const grown = insetPoly(poly, -30);          // a 30 m apron: the wood stops short of the
    const cc = polyCentroid(grown); let r = 0;   // houses instead of pressing against them
    grown.forEach(p => { r = Math.max(r, Math.hypot(p[0] - cc[0], p[1] - cc[1])); });
    return [cc[0], cc[1], r + 35, grown];
  });
  const waterPts = [];
  S.streams.forEach(l => { for (let i = 0; i < l.length; i += 2) waterPts.push(l[i]); });
  S.river.forEach(l => { for (let i = 0; i < l.length; i += 2) waterPts.push(l[i]); });
  const riverPts = [], streamPts = [];
  S.river.forEach(l => { for (let i = 0; i < l.length; i += 2) riverPts.push(l[i]); });
  S.streams.forEach(l => { for (let i = 0; i < l.length; i += 2) streamPts.push(l[i]); });
  const nearest = (pts, wx, wy2) => {
    let m = 1e12;
    for (const p of pts) { const dx = p[0] - wx, dy = p[1] - wy2, d2 = dx * dx + dy * dy; if (d2 < m) m = d2; }
    return Math.sqrt(m);
  };
  const distWater = (wx, wy2) => {
    let m = 1e12;
    for (const p of waterPts) { const dx = p[0] - wx, dy = p[1] - wy2, d2 = dx * dx + dy * dy; if (d2 < m) m = d2; }
    return Math.sqrt(m);
  };
  const oakClear = (wx, wy2) => {
    for (const pl of S.places) { const dx = pl.x - wx, dy = pl.y - wy2; if (dx * dx + dy * dy < 220 * 220) return true; }
    return false;
  };
  const smooth01 = t => { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); };
  function inPoly(px, py, poly) {
    let c = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
      if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) c = !c;
    }
    return c;
  }
  // fields band to the valley floor + a ring OUTSIDE each settlement (radius-relative,
  // so small and large villages both get a consistent apron) — Atelier fix 4
  function nearFieldSettle(wx, syc) {
    if (nearWater(wx, syc)) return true;
    for (const [hx, hy, hr] of resHulls) if ((hx - wx) ** 2 + (hy - syc) ** 2 < (hr + 400) * (hr + 400)) return true;
    return false;
  }
  // 'forest' | 'field' | 'pasture' | 'cemetery' | null   (null = draw nothing)
  function classify(wx, wz) {
    const syc = -wz;                                   // veg uses wz; terrain/slope use northing
    if (distWater(wx, syc) < 35) return null;          // water channel = erased negative space
    if (nearHouse(wx, syc)) return null;         // within 40 m of any roof = village ground
    for (const h of resHulls) {
      if ((h[0] - wx) ** 2 + (h[1] - syc) ** 2 > h[2] * h[2]) continue;   // cheap circle reject
      if (inPoly(wx, syc, h[3])) return null;                              // then the true outline
    }
    for (const cp of S.cemetery) if (inPoly(wx, syc, cp)) return 'cemetery';
    const s = slopeAt(wx, syc);
    const absElev = sampleH(wx, syc) / EXAG + HMIN;    // recover true metres
    // MOUNTAINS ARE DRAWN. Leaving them to the shader is what made the frame read
    // as empty paper — an engraved map hachures its slopes (audit root cause 3).
    // VEGETATION IS TESTED FIRST. Steepness used to win, which turned every wooded
    // flank into bare rock — in the Zagros the oak forest grows exactly on those
    // slopes, and the satellite shows them wooded. Only genuinely cliff-steep
    // ground (>0.85) refuses trees now.
    const v = sampleVeg(wx, wz);
    if (v >= 0.44 && s <= 0.85) return 'forest';
    if (s > 0.62 || (absElev > 1750 && s > 0.35)) return 'rock';
    if (s < 0.30 && v < 0.55 && nearFieldSettle(wx, syc)) return 'field';
    if (s > 0.34) return 'rock';                       // stony open slope
    return 'pasture';                                  // the resting matrix — NEVER blank
  }

  // ---- field lattice (kept primitive) ----
  const FAB = 140;
  const JIT = FAB * 0.15;
  const latV = (i, j) => {
    const h = mulberry32((((i + 4096) * 73856093) ^ ((j + 4096) * 19349663)) >>> 0);
    return [CX + i * FAB + (h() - 0.5) * 2 * JIT, -CZ + j * FAB + (h() - 0.5) * 2 * JIT];
  };
  // one CLEAN field: straight parallel rows at a single angle, bounded by the inset
  // seam only (NO drawn outline — an outline reads as a diagram, not fabric)
  function fabricCell(poly, angleDeg, spPx) {
    x.save();
    x.beginPath();
    poly.forEach((p, k) => k ? x.lineTo(sx(p), sy(p)) : x.moveTo(sx(p), sy(p)));
    x.closePath(); x.clip();
    let mnx = 1e9, mny = 1e9, mxx = -1e9, mxy = -1e9;
    poly.forEach(p => { const X = sx(p), Y = sy(p); if (X < mnx) mnx = X; if (X > mxx) mxx = X; if (Y < mny) mny = Y; if (Y > mxy) mxy = Y; });
    const fx = (mnx + mxx) / 2, fy = (mny + mxy) / 2;
    const a = angleDeg * Math.PI / 180, ca = Math.cos(a), sa = Math.sin(a);
    // Work in the parcel's OWN frame: +u runs along the drill, +v across it. Every
    // parcel gets the identical recipe — a firm drill, a lighter one between, cross
    // stubble, and a headland turning-strip at the two ends — so the patchwork is
    // one fabric. Only the ANGLE changes from cell to cell, plus a small weight.
    x.translate(fx, fy); x.rotate(a);
    let uMin = 1e9, uMax = -1e9, vMin = 1e9, vMax = -1e9;
    poly.forEach(p => {
      const X = sx(p) - fx, Y = sy(p) - fy;
      const u = X * ca + Y * sa, v = -X * sa + Y * ca;
      if (u < uMin) uMin = u; if (u > uMax) uMax = u;
      if (v < vMin) vMin = v; if (v > vMax) vMax = v;
    });
    const pr = mulberry32(((((fx * 131) | 0) ^ (((fy * 977) | 0) << 5)) >>> 0) || 7);
    const wt = 0.86 + pr() * 0.28;          // this parcel's weight in the patchwork
    x.strokeStyle = '#f00'; x.lineCap = 'butt';
    const STEP = spPx * 1.6;
    const nRow = Math.ceil((vMax - vMin) / spPx) + 1;
    for (let k = 0; k <= nRow; k++) {
      const v0 = vMin + k * spPx;
      // two drills: the sown row, and the half-row between it. Density without weight.
      for (let pass = 0; pass < 2; pass++) {
        const vv = v0 + pass * spPx * 0.5;
        if (vv > vMax + spPx) continue;
        x.globalAlpha = (pass ? 0.22 : 0.42) * wt;
        x.lineWidth = pass ? 1.0 : 0.7;   // 0.5 fell under the step(0.16) gate — it drew nothing
        x.setLineDash(pass ? [spPx * 1.7, spPx * 0.55] : [spPx * 3.4, spPx * 0.30]);
        x.lineDashOffset = pr() * spPx * 6;
        x.beginPath();
        let first = true;
        for (let u = uMin - STEP; u <= uMax + STEP; u += STEP) {
          // the ruled hand wavers: the row is straight in intent, not in fact
          const w = Math.sin(u * 0.021 + vv * 0.06) * 0.62 + Math.sin(u * 0.007 + k * 2.1) * 0.88;
          if (first) { x.moveTo(u, vv + w); first = false; } else x.lineTo(u, vv + w);
        }
        x.stroke();
      }
      // stubble — short cross-ticks on the drill, the mark of ground that is worked
      if (k % 2 === 0) {
        x.globalAlpha = 0.25 * wt; x.lineWidth = 0.55; x.setLineDash([]);
        x.beginPath();
        for (let u = uMin + pr() * spPx * 3; u < uMax; u += spPx * (2.6 + pr() * 3.2)) {
          x.moveTo(u, v0 - spPx * 0.17); x.lineTo(u, v0 + spPx * 0.17);
        }
        x.stroke();
      }
    }
    // headland: where the plough turns, the rows run ACROSS the drill at both ends.
    // It gives the parcel an edge without an outline — an outline would read diagram.
    const HW = Math.min(spPx * 2.4, (uMax - uMin) * 0.20);
    if (HW > 1) {
      x.globalAlpha = 0.28 * wt; x.lineWidth = 0.6; x.setLineDash([]);
      [uMin, uMax - HW].forEach(u0 => {
        x.save();
        x.beginPath(); x.rect(u0, vMin - spPx, HW, (vMax - vMin) + spPx * 2); x.clip();
        x.beginPath();
        for (let u = u0; u <= u0 + HW; u += spPx * 0.9) { x.moveTo(u, vMin - spPx); x.lineTo(u, vMax + spPx); }
        x.stroke();
        x.restore();
      });
    }
    x.setLineDash([]);
    x.restore();
  }

  // (1) FIELDS — light straight-ruled patchwork, ONE angle per cell, only where
  // classify=='field' (valley floor + settlement aprons). ~11-16 m row spacing so
  // paper dominates; adjacent cells auto-differ from the hash.
  // VORONOI PARCELS. Irregular many-sided cells that SHARE EDGES: no gaps between
  // fields, no overlaps, nothing floating on paper. Every parcel carries the SAME
  // row pattern at the SAME weight and spacing — only the ANGLE changes, taken from
  // the contour. The roads erased later are the ONLY thing that separates them.
  const FSEED = 130;                                   // mean parcel size, metres
  const CY = -CZ;                                      // scene-y of the plate centre
  const vR = mulberry32(4242);
  const vSeeds = [];
  const halfN = Math.ceil((SPAN / 2) / FSEED) + 2;
  for (let i = -halfN; i <= halfN; i++)
    for (let j = -halfN; j <= halfN; j++)
      vSeeds.push([CX + (i + (vR() - 0.5) * 0.75) * FSEED,
                   CY + (j + (vR() - 0.5) * 0.75) * FSEED]);
  const BIG = FSEED * 4, CUT2 = (FSEED * 5) ** 2;
  function voronoiCell(i) {
    const sx0 = vSeeds[i][0], sy0 = vSeeds[i][1];
    let poly = [[sx0 - BIG, sy0 - BIG], [sx0 + BIG, sy0 - BIG],
                [sx0 + BIG, sy0 + BIG], [sx0 - BIG, sy0 + BIG]];
    for (let k = 0; k < vSeeds.length && poly.length >= 3; k++) {
      if (k === i) continue;
      const dx = vSeeds[k][0] - sx0, dy = vSeeds[k][1] - sy0;
      if (dx * dx + dy * dy > CUT2) continue;          // distant seeds cannot cut this cell
      poly = clipHalf(poly, sx0 + dx / 2, sy0 + dy / 2, dx, dy);
    }
    return poly;
  }
  const fieldWash = [];
  const FIELD_SP = 7 * PXM;                            // ONE spacing for every field
  let fieldCells = 0;
  for (let i = 0; i < vSeeds.length; i++) {
    const scx = vSeeds[i][0], scy = vSeeds[i][1];
    if (classify(scx, -scy) !== 'field') continue;
    const cell = voronoiCell(i);
    if (cell.length < 3) continue;
    fabricCell(cell, parcelAngleAt(scx, scy) + (vR() - 0.5) * 9, FIELD_SP);
    // the wash needs the SAME parcel the ink just drew. Hashing the seed position
    // rather than drawing from vR() keeps the angle sequence above untouched.
    fieldWash.push([cell, Math.floor(mulberry32((((scx * 73856093) ^ (scy * 19349663)) >>> 0) || 3)() * 4)]);
    fieldCells++;
  }
  x.globalAlpha = 1;

  // (2) PASTURE / SCRUB — the resting matrix: at most an occasional contour-lying
  // tuft on classify=='pasture' ground (never circles). Real S.scrub polygons feed
  // it (thinned + gated) plus a very sparse open scatter. Paper dominates ~95:5.
  x.strokeStyle = '#f00';
  x.lineWidth = 0.9;
  x.globalAlpha = 0.40;
  S.scrub.forEach(poly => {
    x.save();
    pathPoly(poly);
    x.clip();
    let mnx = 1e9, mny = 1e9, mxx = -1e9, mxy = -1e9;
    poly.forEach(p => { mnx = Math.min(mnx, sx(p)); mxx = Math.max(mxx, sx(p)); mny = Math.min(mny, sy(p)); mxy = Math.max(mxy, sy(p)); });
    const area = (mxx - mnx) * (mxy - mny);
    for (let i = 0; i < area / 600; i++) {
      const px2 = mnx + rng() * (mxx - mnx), py2 = mny + rng() * (mxy - mny);
      const wxx = ivx(px2), nyy = ivy(py2);
      if (classify(wxx, -nyy) !== 'pasture') continue;   // scrub carries the gate — Atelier fix 1
      tuftAt(wxx, nyy, 2.0);
    }
    x.restore();
  });
  // sparse open-pasture scatter across the disk — makes the pasture class renderable
  // beyond the scrub polygons (Atelier fix 2), still ~paper-dominant
  const pRng = mulberry32(217);
  let pTries = 0, pDrawn = 0;
  while (pDrawn < 11000 && pTries++ < 150000) {
    const a = pRng() * 6.28, d = 120 + Math.sqrt(pRng()) * 1400;   // the 2.5 km plate, not 9 km
    const wx = CX + Math.cos(a) * d, wz = CZ + Math.sin(a) * d;
    if (classify(wx, wz) !== 'pasture') continue;
    tuftAt(wx, -wz, 2.0);
    pDrawn++;
  }
  x.globalAlpha = 1;

  // (2b) ROCK / MOUNTAIN — short contour-lying hachures, denser as the ground
  // steepens: the engraver's way of saying "mountain". Replaces blank paper.
  x.strokeStyle = '#f00';
  x.lineWidth = 0.8;
  x.globalAlpha = 0.34;
  const rRng = mulberry32(881);
  let rTries = 0, rDrawn = 0;
  while (rDrawn < 16000 && rTries++ < 200000) {
    const a = rRng() * 6.28, d = 120 + Math.sqrt(rRng()) * 1400;
    const wx = CX + Math.cos(a) * d, wz = CZ + Math.sin(a) * d;
    if (classify(wx, wz) !== 'rock') continue;
    if (rRng() > Math.min(1, 0.30 + slopeAt(wx, -wz) * 1.5)) continue;  // steeper = denser
    tuftAt(wx, -wz, 2.6);
    rDrawn++;
  }
  x.globalAlpha = 1;

  // (3) FOREST — a soft woolly Zagros oak wood: thousands of tiny FILLED lobes
  // clustered into contiguous masses, packed dark core feathering to bare paper
  // (the smoothstep on veg IS the feathered edge — no clip, no outline). 2D ONLY,
  // decoupled from the 3D-tree seed set so it can go dense without touching the GPU.
  const FOREST_LOBES = [];
  const forestProb = (wx, wz) => classify(wx, wz) !== 'forest'
    ? 0 : 0.12 + 0.88 * smooth01((sampleVeg(wx, wz) - 0.62) / 0.23);
  const fRng = mulberry32(911);
  // EVEN SPACING, like their wood: a jittered lattice, so every tree sits nicely
  // beside its neighbours with real air between them — never a random clump.
  // HONEYCOMB: every other row offset by half a step and rows spaced sqrt(3)/2 apart.
  // Hexagonal packing is the densest arrangement of equal circles — each crown meets
  // six neighbours with almost no wasted paper and without invading any of them.
  const TSP = 7;                                     // metres between crown centres
  const TROW = TSP * 0.866;
  const fI = Math.ceil((SPAN / 2) / TSP), fJ = Math.ceil((SPAN / 2) / TROW);
  for (let j = -fJ; j <= fJ; j++) {
    const off = (j & 1) ? TSP * 0.5 : 0;             // the stagger that makes it a honeycomb
    for (let i = -fI; i <= fI; i++) {
      const wx = CX + i * TSP + off + (fRng() - 0.5) * TSP * 0.20;
      const wz = CZ + j * TROW + (fRng() - 0.5) * TROW * 0.20;
      if (classify(wx, wz) !== 'forest') continue;
      FOREST_LOBES.push([wx, wz]);
    }
  }
  // gallery ribbon: soft lobes flanking the Zab in the 36-90 m bank band OUTSIDE the
  // erased channel — bypasses the water-null so the green river thread reads (Atelier fix 3)
  const gRng2 = mulberry32(613);
  S.river.forEach(l => {
    for (const p of l) {
      for (let t = 0; t < 3; t++) {
        const a = gRng2() * 6.28, dd = 36 + gRng2() * 54;
        const wx = p[0] + Math.cos(a) * dd, nyy = p[1] + Math.sin(a) * dd, wz = -nyy;
        if (oakClear(wx, nyy)) continue;
        let inTown = false;
        for (const [hx, hy, hr] of resHulls) if ((hx - wx) ** 2 + (hy - nyy) ** 2 < hr * hr) { inTown = true; break; }
        if (inTown) continue;
        if (slopeAt(wx, nyy) > 0.62) continue;
        if (gRng2() > 0.55) continue;
        FOREST_LOBES.push([wx, wz]);
      }
    }
  });
  x.fillStyle = '#f00';
  FOREST_LOBES.forEach(([wx, wz]) => {
    const cx0 = cxp(wx), cy0 = cyp(wz);
    const r = (4 + fRng() * 1.2) * PXM;              // sized so crowns meet, not overlap
    // only a whisper of shade, tucked under the crown — the dark may peek through
    // BETWEEN trees, but it must never own the wood
    x.globalAlpha = 0.055;
    x.beginPath(); x.arc(cx0 + r * 0.24, cy0 + r * 0.24, r * 0.92, 0, 6.2832); x.fill();
    // the crown itself — this is what holds the attention
    // an OPEN crown: a drawn rim with light inside, never a solid disc
    x.globalAlpha = 0.13;
    x.beginPath(); x.arc(cx0, cy0, r * 0.74, 0, 6.2832); x.fill();
    x.globalAlpha = 0.38;
    x.lineWidth = 0.7;
    x.strokeStyle = '#f00';
    x.beginPath(); x.arc(cx0, cy0, r * 0.76, 0, 6.2832); x.stroke();
  });
  x.globalAlpha = 1;

  // 3D-TREE SEED SET — OAK_FIELD feeds placeTrees() 1:1 to spawn instanced 3D
  // crowns; it is a SEED SET ONLY (no 2D ink — the drawn wood is FOREST_LOBES).
  // Gated to the SAME forest mask; capped at 5000 for the 8 GB Mac (was 8000).
  const cl = (v, a, b) => Math.max(a, Math.min(b, v));
  function oakDensity(wx, wz) {
    if (classify(wx, wz) !== 'forest') return 0;
    return cl(0.62 + (sampleVeg(wx, wz) - 0.44) * 1.6, 0, 1.0);   // forest ground is PLANTED
  }
  const oRng = mulberry32(313);
  // A jittered lattice with jitter kept to +/-25% of the spacing, so no crown ever
  // invades its neighbour — that is what gives their wood its organised, breathing
  // quality instead of a pile of overlapping blobs.
  const OSP = 11, OROW = OSP * 0.866;                 // honeycomb, like the canopy above
  const oI = Math.ceil((SPAN / 2) / OSP), oJ = Math.ceil((SPAN / 2) / OROW);
  for (let j = -oJ; j <= oJ; j++) {
    const off = (j & 1) ? OSP * 0.5 : 0;
    for (let i = -oI; i <= oI; i++) {
      const wx = CX + i * OSP + off + (oRng() - 0.5) * OSP * 0.18;
      const wz = CZ + j * OROW + (oRng() - 0.5) * OROW * 0.18;
      if (oRng() > oakDensity(wx, wz)) continue;
      OAK_FIELD.push([wx, wz]);
    }
  }

  // ---- (3b) THE WASH REGISTER (watercolour) ---------------------------------
  // Chartogne's plate is TWO media at once: binarised ink for the drawing, and a
  // soft CONTINUOUS wash for mass and shade (their baked B channel). Ours was ink
  // only, which is why it read flat and mechanical. The wash goes into the GREEN
  // channel, which the ground shader adds continuously and NEVER binarises — so
  // tone pools under the woods and across the living land, beneath the linework.
  // Soft radial gradients, not blur filters: same softness, a fraction of the cost.
  const washBlob = (wx, wz, rM, a) => {
    const X = cxp(wx), Y = cyp(wz), R = rM * PXM;
    const g = x.createRadialGradient(X, Y, 0, X, Y, R);
    g.addColorStop(0, 'rgba(0,255,0,' + a + ')');
    g.addColorStop(1, 'rgba(0,255,0,0)');
    x.fillStyle = g;
    x.fillRect(X - R, Y - R, R * 2, R * 2);
  };
  x.save();
  x.globalCompositeOperation = 'lighter';        // adds tone without eating the ink
  // pools of shade under the woods — the darkest note of the wash
  for (let i = 0; i < FOREST_LOBES.length; i += 12) {
    washBlob(FOREST_LOBES[i][0], FOREST_LOBES[i][1], 11, 0.016);   // stays under the crowns
  }
  // and a broad wash over all living ground, so the landscape carries tone the way
  // a watercolour underpainting does, instead of sitting on bare paper
  for (let wx = CX - SPAN / 2; wx <= CX + SPAN / 2; wx += 60) {
    for (let wz = CZ - SPAN / 2; wz <= CZ + SPAN / 2; wz += 60) {
      const v = sampleVeg(wx, wz);
      if (v < 0.30) continue;                    // only genuinely wooded ground carries wash
      if (!classify(wx, wz)) continue;           // NEVER over the village or the water:
                                                 // inside the settlement the roofs, lanes and
                                                 // yard trees are the whole drawing
      washBlob(wx, wz, 30, (0.006 + v * 0.018).toFixed(4));
    }
  }
  x.restore();

  // (4) CEMETERY — a quiet fine stipple with a dashed border, its own cover so
  // nothing draws under it. Light tier (alpha 0.45) — Atelier fix 5.
  S.cemetery.forEach(poly => {
    x.save();
    pathPoly(poly);
    x.clip();
    let mnx = 1e9, mny = 1e9, mxx = -1e9, mxy = -1e9;
    poly.forEach(p => { mnx = Math.min(mnx, sx(p)); mxx = Math.max(mxx, sx(p)); mny = Math.min(mny, sy(p)); mxy = Math.max(mxy, sy(p)); });
    x.fillStyle = '#f00';
    x.globalAlpha = 0.45;
    for (let i = 0; i < 350; i++) {
      x.fillRect(mnx + rng() * (mxx - mnx), mny + rng() * (mxy - mny), 1.4, 2.4);
    }
    x.restore();
    pathPoly(poly);
    x.globalAlpha = 0.45;
    x.strokeStyle = '#f00';
    x.lineWidth = 1;
    x.setLineDash([6, 5]);
    x.stroke();
    x.setLineDash([]);
  });
  x.globalAlpha = 1;

  // stream-bank tree-line: the ONLY hedgerow use, thinned to sparse dots (prob 0.2)
  function hedgerow(pts, prob, offPx) {
    for (let i = 0; i < pts.length - 1; i++) {
      const X0 = sx(pts[i]), Y0 = sy(pts[i]);
      const X1 = sx(pts[i + 1]), Y1 = sy(pts[i + 1]);
      const len = Math.hypot(X1 - X0, Y1 - Y0);
      const steps = Math.max(1, Math.floor(len / 7));
      for (let s2 = 0; s2 <= steps; s2++) {
        if (rng() > prob) continue;
        const t = s2 / steps;
        const X = X0 + (X1 - X0) * t + (rng() - 0.5) * offPx;
        const Y = Y0 + (Y1 - Y0) * t + (rng() - 0.5) * offPx;
        x.beginPath();
        x.arc(X, Y, 0.7 + rng() * 1.3, rng() * 6.3, rng() * 6.3 + 3.2 + rng() * 2.4);
        x.stroke();
      }

  x.strokeStyle = '#f00';
  x.lineWidth = 0.9;
  x.globalAlpha = 0.40;
  S.streams.forEach(l => hedgerow(l, 0.2, 4));
  x.globalAlpha = 1;

  // roads carry NO positive treatment here: no corridor, no dots, no rails.
  // a road is where the drawing stops (their R-channel law). The single
  // remaining edge hairline is added in finishRoadInk() AFTER the normal
  // source is captured, so road ink never reaches the relief (Atelier A1).
  x.lineCap = 'round';
  x.lineJoin = 'round';

  // THE TOWN, DRAWN (Atelier R03, highest leverage): every real footprint
  // is inked as a roof rectangle at true angle/size, inset ~1.2 m so
  // adjacent roofs keep a paper seam (so a block reads as MANY houses, not
  // one blob). The minor streets below then erase white lanes THROUGH this
  // built mass — the town becomes organized blocks, streets as pure absence.
  // (footprintFeatures is a hoisted function decl, safe to call here.)
  x.fillStyle = '#f00';
  x.globalAlpha = 0.8;
  S.buildings.map(footprintFeatures).forEach(f => {
    const ca = Math.cos(f.ang), sa = Math.sin(f.ang);
    const hw = Math.max(1.2, f.w / 2 - 1.2), hd = Math.max(1.0, f.d / 2 - 1.2);
    x.beginPath();
    [[-hw, -hd], [hw, -hd], [hw, hd], [-hw, hd]].forEach(([u, v], k) => {
      const px2 = f.x + u * ca - v * sa, py2 = f.y + u * sa + v * ca;
      const X = sx([px2, py2]), Y = sy([px2, py2]);
      k ? x.lineTo(X, Y) : x.moveTo(X, Y);

    x.fill();

  x.globalCompositeOperation = 'destination-out';
  x.globalAlpha = 1;
  x.strokeStyle = '#fff';
  x.lineCap = 'round';
  x.lineJoin = 'round';
  function erasePath(pts, widthM) {
    x.lineWidth = widthM * PXM;
    x.beginPath();
    pts.forEach((p, k) => k ? x.lineTo(sx(p), sy(p)) : x.moveTo(sx(p), sy(p)));
    x.stroke();
  }
  S.tracks.forEach(l => erasePath(l, 4));
  S.roadsMinor.forEach(l => erasePath(l, 8));
  S.roadsMajor.forEach(l => erasePath(l, 9));
  S.streams.forEach(l => erasePath(l, 3));
  S.river.forEach(l => erasePath(l, 34));
  // NO yard-erase now: it used to punch an 8 m white hole at every house,
  // which is precisely what left the town a field of holes. The streets above
  // carve the negative space; the inked roofs are the figure (Atelier R03).
  x.globalAlpha = 1;
  x.globalCompositeOperation = 'source-over';

  // the river's water: wavering flow lines inside the erased band
  x.strokeStyle = '#f00';
  x.lineCap = 'round';
  S.river.forEach(pts => {
    for (let k = -1; k <= 1; k++) {
      x.lineWidth = 1.4;
      x.globalAlpha = 0.8;
      x.setLineDash([30 + Math.random() * 40, 14 + Math.random() * 10]);
      x.beginPath();
      for (let i = 0; i < pts.length - 1; i++) {
        const p = pts[i], q = pts[i + 1];
        const ddx = sx(q) - sx(p), ddy = sy(q) - sy(p);
        const len = Math.hypot(ddx, ddy) || 1;
        const nx = -ddy / len, ny = ddx / len;
        const off = k * 8 * PXM + Math.sin(i * 0.7) * 2.5;
        const X = sx(p) + nx * off, Y = sy(p) + ny * off;
        i === 0 ? x.moveTo(X, Y) : x.lineTo(X, Y);
      }
      x.stroke();
    }
  });
  x.setLineDash([]);

  // ---- THE GROUND BETWEEN THE HOUSES -------------------------------------------
  // classify() returns null across the whole settlement, so the yards and lanes were
  // coming out as bare sheet — the one part of the plate where the eye has to spend
  // most of its time. This is trodden earth: scuffs lying every which way, loose
  // stones, and the odd cart rut. Nothing ruled, nothing repeating, and kept sparse
  // enough that the houses still own the tone.
  {
    const yRng = mulberry32(5150);
    const STEP = 2.6;
    x.lineCap = 'round';
    for (let wy = CY - SPAN / 2; wy < CY + SPAN / 2; wy += STEP) {
      for (let wx = CX - SPAN / 2; wx < CX + SPAN / 2; wx += STEP) {
        if (!nearHouse(wx, wy)) continue;                  // settlement ground only
        if (distWater(wx, wy) < 30) continue;
        const jx = wx + (yRng() - 0.5) * STEP, jy = wy + (yRng() - 0.5) * STEP;
        const X = sx([jx, jy]), Y = sy([jx, jy]);
        const r = yRng();
        if (r < 0.46) {                                    // a scuff, any direction
          const a = yRng() * Math.PI * 2, L = (1.4 + yRng() * 3.0) * PXM;
          x.strokeStyle = '#f00';
          x.globalAlpha = 0.15 + yRng() * 0.17;
          x.lineWidth = 0.8;
          x.beginPath();
          x.moveTo(X - Math.cos(a) * L / 2, Y - Math.sin(a) * L / 2);
          x.lineTo(X + Math.cos(a) * L / 2, Y + Math.sin(a) * L / 2);
          x.stroke();
        } else if (r < 0.60) {                             // a loose stone
          x.fillStyle = '#f00';
          x.globalAlpha = 0.18 + yRng() * 0.14;
          x.beginPath();
          x.arc(X, Y, (0.30 + yRng() * 0.50) * PXM, 0, 6.283);
          x.fill();
        } else if (r < 0.70) {                             // a wheel rut, twin lines
          const a = yRng() * Math.PI * 2, L = (3.0 + yRng() * 5.0) * PXM;
          const nx2 = -Math.sin(a) * 0.55 * PXM, ny2 = Math.cos(a) * 0.55 * PXM;
          x.strokeStyle = '#f00';
          x.globalAlpha = 0.11 + yRng() * 0.10;
          x.lineWidth = 0.7;
          x.beginPath();
          for (const sgn of [1, -1]) {
            x.moveTo(X + nx2 * sgn - Math.cos(a) * L / 2, Y + ny2 * sgn - Math.sin(a) * L / 2);
            x.lineTo(X + nx2 * sgn + Math.cos(a) * L / 2, Y + ny2 * sgn + Math.sin(a) * L / 2);
          }
          x.stroke();
        }
      }
    }
    x.globalAlpha = 1;
  }

  // ---- WHERE THE WOOD TURNS -----------------------------------------------------
  // Oaks do not turn at random, tree by tree. Aspect, moisture and species run in
  // patches, so a whole stand goes over together while the gully beside it stays
  // green. A per-instance hash gave confetti; this is a smooth two-octave field at
  // ~175 m, and it is baked to a map so the CROWNS and the GROUND under them read
  // the same stand instead of disagreeing.
  const sh2 = (i, j) => { const n = Math.sin(i * 127.1 + j * 311.7) * 43758.5453; return n - Math.floor(n); };
  const svn = (x, y) => {
    const i = Math.floor(x), j = Math.floor(y), fx = x - i, fy = y - j;
    const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
    return (sh2(i, j) * (1 - ux) + sh2(i + 1, j) * ux) * (1 - uy)
         + (sh2(i, j + 1) * (1 - ux) + sh2(i + 1, j + 1) * ux) * uy;
  };
  // measured: 38% still green, 34% turned, 28% bare — mean stand 129 m across
  const standAt = (wx, sy2) => {
    const n = svn(wx / 175, sy2 / 175) * 0.68 + svn(wx / 64 + 11.3, sy2 / 64 - 7.1) * 0.32;
    return n < 0.4352 ? 0 : n < 0.6054 ? 1 : 2;
  };
  {
    const SN = 256;
    const stc = document.createElement('canvas');
    stc.width = stc.height = SN;
    const stx = stc.getContext('2d');
    const sim = stx.createImageData(SN, SN);
    for (let j = 0; j < SN; j++) for (let i = 0; i < SN; i++) {
      const v = standAt(ivx((i + 0.5) / SN * TEXN), ivy((j + 0.5) / SN * TEXN));
      const o = (j * SN + i) * 4;
      sim.data[o] = v === 2 ? 255 : v === 1 ? 128 : 0;
      sim.data[o + 3] = 255;
    }
    stx.putImageData(sim, 0, 0);
    standCanvas = stc;
  }

  // ---- THE PIGMENT PLATE -------------------------------------------------------
  // Baked from the SAME classify() that decides what gets drawn, so the wash and
  // the drawing can never disagree. Deliberately low resolution: a wash has no
  // edges of its own, and every edge on this plate belongs to the ink.
  {
    const PGN = 384;
    const pc = document.createElement('canvas');
    pc.width = pc.height = PGN;
    const pctx = pc.getContext('2d');
    const im = pctx.createImageData(PGN, PGN);
    const d = im.data;
    // parcels take their tone from a 130 m cell hash, close to the mean parcel size,
    // so the valley floor reads as a patchwork of worked plots rather than one field
    const FIELDS = [PIG.fieldA, PIG.fieldB, PIG.fieldC, PIG.fieldD];
    // parcel index plate: each real Voronoi cell filled flat, so the wash follows the
    // surveyed parcel edges instead of the 130 m square grid that was showing through
    const sc = document.createElement('canvas');
    sc.width = sc.height = PGN;
    const sctx = sc.getContext('2d');
    sctx.fillStyle = '#000'; sctx.fillRect(0, 0, PGN, PGN);
    const K = PGN / TEXN;
    fieldWash.forEach(([poly, vi]) => {
      sctx.fillStyle = `rgb(${55 + vi * 55},0,0)`;
      sctx.beginPath();
      poly.forEach((p, q) => q ? sctx.lineTo(sx(p) * K, sy(p) * K) : sctx.moveTo(sx(p) * K, sy(p) * K));
      sctx.closePath(); sctx.fill();
    });
    const scd = sctx.getImageData(0, 0, PGN, PGN).data;
    for (let j = 0; j < PGN; j++) {
      for (let i = 0; i < PGN; i++) {
        const WX = ivx((i + 0.5) / PGN * TEXN), SY = ivy((j + 0.5) / PGN * TEXN);
        const k = classify(WX, -SY);
        let p;
        if (k === 'forest') {
          const st = standAt(WX, SY);
          p = st === 2 ? PIG.forestR : st === 1 ? PIG.forestY : PIG.forest;
        }
        else if (k === 'field') {
          const vi = scd[(j * PGN + i) * 4];
          p = FIELDS[vi > 200 ? 3 : vi > 145 ? 2 : vi > 90 ? 1 : 0];
        }
        else if (k === 'rock') p = PIG.rock;
        else if (k === 'pasture') p = PIG.pasture;
        else if (k === 'cemetery') p = PIG.orchard;
        else {
          // The Great Zab and a seasonal Zagros stream are not the same thing and must
          // not take the same wash. The river is a standing body of water; a stream here
          // is a stony channel that runs in spring and is dry gravel by June, which is
          // the season this plate depicts. Painting both blue at a 35 m half-width drew
          // two rivers that do not exist.
          const dR = nearest(riverPts, WX, SY), dS = nearest(streamPts, WX, SY);
          p = dR < 45  ? PIG.water
            : dR < 120 ? PIG.bank
            : dS < 9   ? PIG.wadi
            : dS < 26  ? PIG.gravel
            : PIG.village;
        }
        const o = (j * PGN + i) * 4;
        d[o] = p[0] * 255; d[o + 1] = p[1] * 255; d[o + 2] = p[2] * 255; d[o + 3] = p[3] * 255;
      }
    }
    pctx.putImageData(im, 0, 0);
    pigmentCanvas = pc;
  }

  return c;
}

const OAK_FIELD = [];
const marksCanvas = buildMarks();

// A second, HALF-RESOLUTION buffer holding pigment only. It exists because the data

// A is already the accent channel carrying the blue label and the river. Smuggling a
// colour index into A fails on the transparent passes, where alpha is simultaneously
// the blend coverage — the two meanings corrupt each other. A wash carries no edges
// of its own, so half resolution costs nothing visible and a quarter of the memory.
const PIG_FRAG = /* glsl */`
  uniform sampler2D uPigMap;
  uniform vec2 uCenter;
  uniform float uSpan;
  uniform vec3 uPigLo;
  uniform vec3 uPigHi;
  uniform vec3 uPigTop;
  uniform vec3 uLightDir;
  uniform float uPigS;
  uniform float uPigMode;
  uniform float uPigVary;
  uniform sampler2D uStandMap;
  uniform vec3 uVar1Lo; uniform vec3 uVar1Hi; uniform vec3 uVar1Top;
  uniform vec3 uVar2Lo; uniform vec3 uVar2Hi; uniform vec3 uVar2Top;
  varying vec3 vWorldPos;
  varying vec3 vNormalW;
  varying float vPhase;
  float ph2(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float pnoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(mix(ph2(i), ph2(i + vec2(1, 0)), u.x),
               mix(ph2(i + vec2(0, 1)), ph2(i + vec2(1, 1)), u.x), u.y);
  }
  void main() {
    if (uPigMode < 0.5) {
      gl_FragColor = texture2D(uPigMap, (vWorldPos.xz - uCenter) / uSpan + 0.5);
    } else {
      // sunlit faces take the lighter mix, shaded ones the deeper: the wash follows
      // the same light the hatching does, so colour and line agree
      vec3 n = normalize(vNormalW);
      float up  = smoothstep(0.30, 0.88, n.y);
      float lit = clamp(dot(n, uLightDir), 0.0, 1.0);
      // A wood is not one colour. vPhase is a per-instance hash of the tree's own
      // position, so each crown draws its own colourway and the same stand carries
      // green, turned and bare oak side by side — which is what a Zagros hillside
      // actually looks like between the winter rains and the full spring flush.
      vec3 lo = uPigLo, hi = uPigHi, top = uPigTop;
      if (uPigVary > 1.5) {
        // HOUSES: a CONTINUOUS spectrum, not three buckets sitting next to each other.
        // Two smooth fields place a house — one for how pale it is, limewash through to
        // grey block; one for how warm, grey through to brown — and both are correlated
        // over roughly 150 m, so a street agrees with itself and the tone drifts slowly
        // across the village. A small per-instance jitter keeps neighbours from being
        // identical without letting any two of them clash.
        vec2 wp = vWorldPos.xz;
        float t = clamp(pnoise(wp * 0.0062) * 0.72 + pnoise(wp * 0.019 + 5.3) * 0.28
                        + (vPhase - 0.5) * 0.20, 0.0, 1.0);
        float u = clamp(pnoise(wp * 0.0081 + 21.7) * 0.74 + pnoise(wp * 0.026 + 9.1) * 0.26
                        + (fract(vPhase * 4.31) - 0.5) * 0.22, 0.0, 1.0) * 0.80;
        lo  = mix(mix(uVar1Lo,  uVar2Lo,  t), uPigLo,  u);
        hi  = mix(mix(uVar1Hi,  uVar2Hi,  t), uPigHi,  u);
        top = mix(mix(uVar1Top, uVar2Top, t), uPigTop, u);
      } else if (uPigVary > 0.5) {
        float st = texture2D(uStandMap, (vWorldPos.xz - uCenter) / uSpan + 0.5).r;
        if (st > 0.75)      { lo = uVar2Lo; hi = uVar2Hi; }
        else if (st > 0.25) { lo = uVar1Lo; hi = uVar1Hi; }
      }
      vec3 side = mix(lo, hi, lit);           // shaded -> sunlit
      vec3 c = mix(side, top, up);            // -> the roof plane / the crown top
      c *= 0.94 + vPhase * 0.12;              // every instance its own mix in the pan
      gl_FragColor = vec4(c, uPigS);
    }
  }
`;

      uSpan:    { value: SPAN },
      uPigLo:   { value: new THREE.Vector3(lo[0], lo[1], lo[2]) },
      uPigHi:   { value: new THREE.Vector3(hi[0], hi[1], hi[2]) },
      uPigTop:  { value: new THREE.Vector3(top[0], top[1], top[2]) },
      uLightDir:{ value: P.lightDir },
      uPigS:    { value: strength },
      uPigMode: { value: opts.map ? 0 : 1 },
      uPigVary: { value: opts.ways ? 2 : opts.vary ? 1 : 0 },
      uVar1Top: { value: new THREE.Vector3(...((opts.ways ? opts.ways[2] : [0,0,0]).slice(0,3))) },
      uVar2Top: { value: new THREE.Vector3(...((opts.ways ? opts.ways[5] : [0,0,0]).slice(0,3))) },
      uStandMap: { value: standTex },
      uVar1Lo: { value: new THREE.Vector3(...((opts.ways || opts.vary || [[0,0,0]])[0]).slice(0,3)) },
      uVar1Hi: { value: new THREE.Vector3(...((opts.ways || opts.vary || [0,[0,0,0]])[1]).slice(0,3)) },
      uVar2Lo: { value: new THREE.Vector3(...((opts.ways ? opts.ways[3] : opts.vary ? opts.vary[2] : [0,0,0])).slice(0,3)) },
      uVar2Hi: { value: new THREE.Vector3(...((opts.ways ? opts.ways[4] : opts.vary ? opts.vary[3] : [0,0,0])).slice(0,3)) },

const SHW = (() => {
