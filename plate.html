<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Plate Being Cut — Barzan</title>
<style>
  :root {
    --paper: #f8f6ef;
    --ink:   #706859;
    --faint: #a89f8c;
    --rule:  #c9c0ab;
    --madder:#a33a2e;
    --display:'Hoefler Text','Baskerville','Palatino Linotype',Palatino,'Times New Roman',serif;
    --mono: ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
  }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:#efeade; color:#46402f; font-family:var(--display); }
  .wrap { min-height:100%; display:flex; flex-direction:column; align-items:center;
          padding:clamp(.8rem,3vw,2rem); gap:1rem; }
  .head { width:100%; max-width:1180px; display:flex; flex-wrap:wrap; align-items:baseline;
          justify-content:space-between; gap:.6rem 1.4rem; }
  h1 { font-size:clamp(1rem,2.6vw,1.35rem); font-weight:400; letter-spacing:.24em;
       text-transform:uppercase; margin:0; color:var(--madder); }
  /* three sizes only, at 1.5x and 1.25x steps: title, running text, machine text.
     The plate is the content — the chrome around it stays deliberately quiet. */
  .note { font-size:.9rem; color:#8a8270; margin:0; max-width:56ch; }
  .frame { position:relative; width:100%; max-width:1180px; background:var(--paper);
           border:1px solid var(--rule); box-shadow:0 18px 40px -26px rgba(70,64,47,.7); }
  canvas { display:block; width:100%; height:auto; }
  .bar { width:100%; max-width:1180px; display:flex; flex-wrap:wrap; align-items:center; gap:.8rem 1.2rem; }
  .stage { font-family:var(--mono); font-size:.72rem; letter-spacing:.16em; text-transform:uppercase;
           color:var(--madder); min-width:12ch; }
  .track { flex:1; min-width:160px; height:2px; background:var(--rule); position:relative; }
  .fill  { position:absolute; inset:0 auto 0 0; width:0; background:var(--ink); }
  button, select {
    font-family:var(--mono); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase;
    background:transparent; color:#46402f; border:1px solid var(--rule); padding:.55rem .9rem; cursor:pointer;
  }
  button:hover { border-color:var(--ink); }
  button:focus-visible, select:focus-visible { outline:2px solid var(--madder); outline-offset:2px; }
  .legend { width:100%; max-width:1180px; font-size:.9rem; color:#8a8270; }
  .legend b { color:var(--madder); font-weight:400; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>The Plate Being Cut</h1>
    <p class="note">Barzan drawing itself from the survey data, in the order an engraver would
      work: relief, then parcels, then oak, then water, ways, roofs — and the wash laid last,
      underneath the finished line.</p>
  </div>

  <div class="frame"><canvas id="c"></canvas></div>

  <div class="bar">
    <span class="stage" id="stage">ready</span>
    <div class="track"><div class="fill" id="fill"></div></div>
    <select id="speed" aria-label="Speed">
      <option value="1">1×</option>
      <option value="2" selected>2×</option>
      <option value="4">4×</option>
      <option value="10">10×</option>
    </select>
    <button id="again">Cut it again</button>
  </div>

  <p class="legend" id="legend">Loading survey data…</p>
</div>

<script type="module">
const [T, S, VEG] = await Promise.all([
  fetch('./data/terrain.json').then(r => r.json()),
  fetch('./data/scene.json').then(r => r.json()),
  fetch('./data/veg.json').then(r => r.json())
]);

/* ---- the real sampling, ported verbatim from the map ---- */
const G = T.grid, HMIN = T.min, W = S.extentW, H = S.extentH, EXAG = 1.12, HTS = T.heights;
function sampleH(x, yN) {
  let i = (x / W + 0.5) * (G - 1), j = (0.5 - yN / H) * (G - 1);
  i = Math.max(0, Math.min(G - 1.001, i)); j = Math.max(0, Math.min(G - 1.001, j));
  const i0 = i | 0, j0 = j | 0, fx = i - i0, fy = j - j0;
  const h00 = HTS[j0*G+i0], h10 = HTS[j0*G+i0+1], h01 = HTS[(j0+1)*G+i0], h11 = HTS[(j0+1)*G+i0+1];
  return ((h00*(1-fx)+h10*fx)*(1-fy) + (h01*(1-fx)+h11*fx)*fy - HMIN) * EXAG;
}
const VG = VEG.grid, VEW = VEG.extentW, VEH = VEG.extentH, VD = VEG.dens;
function vegAt(x, n) {
  let i = (x / VEW + 0.5) * VG, j = (-n / VEH + 0.5) * VG;
  i = Math.max(0, Math.min(VG-1, i|0)); j = Math.max(0, Math.min(VG-1, j|0));
  return VD[j*VG+i] / 255;
}
function slopeAt(x, n) {
  const e = 18;
  const gx = sampleH(x+e,n) - sampleH(x-e,n), gy = sampleH(x,n+e) - sampleH(x,n-e);
  return Math.hypot(gx, gy) / (2*e);
}
function gradAt(x, n) {
  const e = 26;
  return [sampleH(x+e,n) - sampleH(x-e,n), sampleH(x,n+e) - sampleH(x,n-e)];
}
function mulberry32(a) {
  return function() { a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a>>>15, 1|a); t = t + Math.imul(t ^ t>>>7, 61|t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296; };
}

const town = S.places.find(p => p.t === 'town') ?? S.places[0];
const CX = town.x, CY = town.y, SPAN = 2500, HALF = SPAN/2;

/* ---- spatial indices so classify() is not O(n) per sample ---- */
const CELL = 120;
function gridIndex(pts) {
  const m = new Map();
  pts.forEach(p => {
    const k = (Math.floor(p[0]/CELL)) + ':' + (Math.floor(p[1]/CELL));
    (m.get(k) || m.set(k, []).get(k)).push(p);
  });
  return m;
}
function nearAny(idx, x, n, r) {
  const gx = Math.floor(x/CELL), gy = Math.floor(n/CELL), rc = Math.ceil(r/CELL), r2 = r*r;
  for (let a=-rc;a<=rc;a++) for (let b=-rc;b<=rc;b++) {
    const list = idx.get((gx+a)+':'+(gy+b)); if (!list) continue;
    for (const p of list) if ((p[0]-x)**2 + (p[1]-n)**2 < r2) return true;
  }
  return false;
}
const bldPts = S.buildings.map(poly => {
  let sx=0, sy=0; poly.forEach(p => { sx+=p[0]; sy+=p[1]; });
  return [sx/poly.length, sy/poly.length];
});
const bldIdx = gridIndex(bldPts);
const waterPts = []; S.streams.forEach(l => { for (let i=0;i<l.length;i+=2) waterPts.push(l[i]); });
const waterIdx = gridIndex(waterPts);

function classify(x, n) {
  if (nearAny(waterIdx, x, n, 35)) return null;
  if (nearAny(bldIdx, x, n, 40)) return null;
  const s = slopeAt(x, n), v = vegAt(x, n);
  const absElev = sampleH(x, n)/EXAG + HMIN;
  if (v >= 0.44 && s <= 0.85) return 'forest';
  if (s > 0.62 || (absElev > 1750 && s > 0.35)) return 'rock';
  if (s < 0.30 && v < 0.55 && nearAny(bldIdx, x, n, 480)) return 'field';
  if (s > 0.34) return 'rock';
  return 'pasture';
}

/* ---- the sheet ---- */
const cv = document.getElementById('c');
const DPR = Math.min(devicePixelRatio || 1, 2);
const CSSW = 1180, CSSH = 760;
cv.width = CSSW*DPR; cv.height = CSSH*DPR;
cv.style.aspectRatio = CSSW + '/' + CSSH;
const x = cv.getContext('2d');
x.scale(DPR, DPR);
const PX = CSSW / SPAN;                    // px per metre
const sx = wx => (wx - CX) * PX + CSSW/2;
const sy = wn => (CY - wn) * PX + CSSH/2;
const INK = '112,104,89';
const ink = a => `rgba(${INK},${a})`;

function clearSheet() {
  x.setTransform(DPR,0,0,DPR,0,0);
  x.fillStyle = '#f8f6ef'; x.fillRect(0,0,CSSW,CSSH);
  x.globalCompositeOperation = 'source-over';
}

/* ---- geometry helpers ---- */
function clipHalf(poly, px, py, nx, ny) {
  const out = [], side = p => (p[0]-px)*nx + (p[1]-py)*ny;
  for (let i=0;i<poly.length;i++) {
    const a = poly[i], b = poly[(i+1)%poly.length], sa = side(a), sb = side(b);
    if (sa <= 0) out.push(a);
    if ((sa<0&&sb>0)||(sa>0&&sb<0)) { const t = sa/(sa-sb); out.push([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t]); }
  }
  return out;
}

/* ============================================================
   THE STAGES. Each is a generator that yields often, so the
   browser paints between strokes and you watch it being cut.
   ============================================================ */
const STAGES = [];
const add = (name, gen) => STAGES.push({ name, gen });

/* 1 — RELIEF: strokes lying along the contour, density from slope */
add('relief', function* () {
  x.lineCap = 'round';
  const STEP = 13;
  for (let py = 0; py < CSSH; py += STEP) {
    x.beginPath();
    for (let px = 0; px < CSSW; px += STEP) {
      const wx = CX + (px - CSSW/2)/PX, wn = CY - (py - CSSH/2)/PX;
      const s = slopeAt(wx, wn);
      if (s < 0.055) continue;
      const [gx, gy] = gradAt(wx, wn);
      const a = Math.atan2(-gx, gy);               // along the contour
      const len = 4 + Math.min(9, s * 15);
      const jx = (Math.sin(px*12.9+py*78.2)*0.5+0.5 - 0.5) * 4;
      const jy = (Math.sin(px*39.3+py*11.7)*0.5+0.5 - 0.5) * 4;
      x.moveTo(px + jx - Math.cos(a)*len/2, py + jy - Math.sin(a)*len/2);
      x.lineTo(px + jx + Math.cos(a)*len/2, py + jy + Math.sin(a)*len/2);
    }
    x.strokeStyle = ink(0.16); x.lineWidth = 0.7; x.stroke();
    if (py % (STEP*4) === 0) yield;
  }
});

/* 2 — PARCELS: real Voronoi cells, the drill / half-row / stubble recipe */
add('parcels', function* () {
  const FSEED = 130, vR = mulberry32(4242), seeds = [];
  const nHalf = Math.ceil(HALF/FSEED) + 1;
  for (let i=-nHalf;i<=nHalf;i++) for (let j=-nHalf;j<=nHalf;j++)
    seeds.push([CX + (i + (vR()-0.5)*0.75)*FSEED, CY + (j + (vR()-0.5)*0.75)*FSEED]);
  const BIG = FSEED*4, CUT2 = (FSEED*5)**2, SP = 7*PX;
  for (let i=0;i<seeds.length;i++) {
    const [cx0, cy0] = seeds[i];
    if (Math.abs(cx0-CX) > HALF+80 || Math.abs(cy0-CY) > HALF+80) continue;
    if (classify(cx0, cy0) !== 'field') { if (i%12===0) yield; continue; }
    let poly = [[cx0-BIG,cy0-BIG],[cx0+BIG,cy0-BIG],[cx0+BIG,cy0+BIG],[cx0-BIG,cy0+BIG]];
    for (let k=0;k<seeds.length && poly.length>=3;k++) {
      if (k===i) continue;
      const dx = seeds[k][0]-cx0, dy = seeds[k][1]-cy0;
      if (dx*dx+dy*dy > CUT2) continue;
      poly = clipHalf(poly, cx0+dx/2, cy0+dy/2, dx, dy);
    }
    if (poly.length < 3) continue;
    const [gx, gy] = gradAt(cx0, cy0);
    const ang = Math.atan2(gx, gy) + (vR()-0.5)*0.16;
    x.save();
    x.beginPath();
    poly.forEach((p,k) => k ? x.lineTo(sx(p[0]), sy(p[1])) : x.moveTo(sx(p[0]), sy(p[1])));
    x.closePath(); x.clip();
    const ca = Math.cos(ang), sa2 = Math.sin(ang);
    const fx = sx(cx0), fy = sy(cy0);
    x.translate(fx, fy); x.rotate(ang);
    let uMin=1e9,uMax=-1e9,vMin=1e9,vMax=-1e9;
    poly.forEach(p => {
      const X = sx(p[0])-fx, Y = sy(p[1])-fy;
      const u = X*ca + Y*sa2, v = -X*sa2 + Y*ca;
      uMin=Math.min(uMin,u); uMax=Math.max(uMax,u); vMin=Math.min(vMin,v); vMax=Math.max(vMax,v);
    });
    const pr = mulberry32(((cx0*131)|0 ^ ((cy0*977)|0)<<5) >>> 0 || 7);
    const nRow = Math.ceil((vMax-vMin)/SP)+1;
    for (let k=0;k<=nRow;k++) {
      const v0 = vMin + k*SP;
      for (let pass=0; pass<2; pass++) {
        const vv = v0 + pass*SP*0.5; if (vv > vMax+SP) continue;
        x.globalAlpha = pass ? 0.22 : 0.42;
        x.lineWidth = pass ? 1.0 : 0.7;
        x.setLineDash(pass ? [SP*1.7, SP*0.55] : [SP*3.4, SP*0.30]);
        x.lineDashOffset = pr()*SP*6;
        x.strokeStyle = ink(1);
        x.beginPath();
        let first = true;
        for (let u=uMin-SP*1.6; u<=uMax+SP*1.6; u+=SP*1.6) {
          const w = Math.sin(u*0.021+vv*0.06)*0.62 + Math.sin(u*0.007+k*2.1)*0.88;
          first ? (x.moveTo(u, vv+w), first=false) : x.lineTo(u, vv+w);
        }
        x.stroke();
      }
      if (k%2===0) {
        x.globalAlpha = 0.25; x.lineWidth = 0.55; x.setLineDash([]);
        x.beginPath();
        for (let u=uMin+pr()*SP*3; u<uMax; u+=SP*(2.6+pr()*3.2)) {
          x.moveTo(u, v0-SP*0.17); x.lineTo(u, v0+SP*0.17);
        }
        x.stroke();
      }
    }
    x.restore(); x.globalAlpha = 1; x.setLineDash([]);
    yield;
  }
});

/* 3 — OAK: honeycomb-packed crowns wherever the satellite says woodland */
add('oak', function* () {
  const R = 7, RS = R*Math.sqrt(3)/2, rng = mulberry32(99);
  let row = 0;
  for (let wn = CY-HALF; wn <= CY+HALF; wn += RS, row++) {
    x.beginPath();
    for (let wx = CX-HALF + (row%2 ? R/2 : 0); wx <= CX+HALF; wx += R) {
      if (classify(wx, wn) !== 'forest') continue;
      const jx = (rng()-0.5)*R*0.5, jy = (rng()-0.5)*R*0.5;
      const px = sx(wx+jx), py = sy(wn+jy);
      const rr = (R*0.46 + rng()*R*0.22) * PX;
      const lobes = 5;
      for (let l=0;l<lobes;l++) {
        const a = l/lobes*Math.PI*2 + rng()*0.5;
        const lr = rr*(0.5+rng()*0.28);
        x.moveTo(px + Math.cos(a)*rr*0.4 + lr, py + Math.sin(a)*rr*0.4);
        x.arc(px + Math.cos(a)*rr*0.4, py + Math.sin(a)*rr*0.4, lr, 0, Math.PI*2);
      }
    }
    x.strokeStyle = ink(0.30); x.lineWidth = 0.6; x.stroke();
    if (row % 3 === 0) yield;
  }
});

/* 4 — WATER: the seasonal channels, a thread and its stony margin */
add('water', function* () {
  for (const line of S.streams) {
    const inFrame = line.some(p => Math.abs(p[0]-CX) < HALF+120 && Math.abs(p[1]-CY) < HALF+120);
    if (!inFrame) continue;
    x.beginPath();
    line.forEach((p,i) => i ? x.lineTo(sx(p[0]), sy(p[1])) : x.moveTo(sx(p[0]), sy(p[1])));
    x.strokeStyle = ink(0.34); x.lineWidth = 1.5; x.setLineDash([]); x.stroke();
    x.strokeStyle = ink(0.14); x.lineWidth = 5; x.stroke();
    yield;
  }
});

/* 5 — WAYS: the skeleton, dashed as the reference draws them */
add('ways', function* () {
  const draw = (set, w, a) => {
    for (const line of set) {
      const inFrame = line.some(p => Math.abs(p[0]-CX) < HALF+120 && Math.abs(p[1]-CY) < HALF+120);
      if (!inFrame) continue;
      x.beginPath();
      line.forEach((p,i) => i ? x.lineTo(sx(p[0]), sy(p[1])) : x.moveTo(sx(p[0]), sy(p[1])));
      x.strokeStyle = '#f8f6ef'; x.lineWidth = w+3.5; x.setLineDash([]); x.stroke();
      x.strokeStyle = ink(a); x.lineWidth = w; x.setLineDash([7,4]); x.stroke();
    }
  };
  draw(S.roadsMajor, 2.0, 0.42); yield;
  draw(S.roadsMinor, 1.3, 0.34); yield;
  draw(S.tracks,     1.0, 0.26); yield;
  x.setLineDash([]);
});

/* 6 — ROOFS: 721 surveyed footprints, hatched on the shade flank */
add('roofs', function* () {
  const rng = mulberry32(1926);
  let i = 0;
  for (const poly of S.buildings) {
    if (!poly.some(p => Math.abs(p[0]-CX) < HALF+40 && Math.abs(p[1]-CY) < HALF+40)) { i++; continue; }
    x.save(); x.beginPath();
    poly.forEach((p,k) => k ? x.lineTo(sx(p[0]), sy(p[1])) : x.moveTo(sx(p[0]), sy(p[1])));
    x.closePath();
    x.fillStyle = '#f8f6ef'; x.fill();
    x.clip();
    let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
    poly.forEach(p => { const X=sx(p[0]),Y=sy(p[1]);
      mnx=Math.min(mnx,X);mxx=Math.max(mxx,X);mny=Math.min(mny,Y);mxy=Math.max(mxy,Y); });
    x.strokeStyle = ink(0.5); x.lineWidth = 0.6;
    x.beginPath();
    for (let d = mnx-(mxy-mny); d < mxx; d += 2.4) {
      x.moveTo(d, mny); x.lineTo(d + (mxy-mny), mxy);
    }
    x.stroke();
    x.restore();
    x.beginPath();
    poly.forEach((p,k) => k ? x.lineTo(sx(p[0]), sy(p[1])) : x.moveTo(sx(p[0]), sy(p[1])));
    x.closePath();
    x.strokeStyle = ink(0.85); x.lineWidth = 0.9; x.stroke();
    if ((++i) % 6 === 0) yield;
  }
});

/* 7 — THE WASH: laid LAST and UNDERNEATH, the way a plate is tinted */
const PIG = {
  forest:[0.636,0.701,0.507,0.62], forestY:[0.711,0.695,0.499,0.62], forestR:[0.757,0.657,0.506,0.60],
  fieldA:[0.875,0.895,0.806,0.46], fieldB:[0.783,0.826,0.661,0.56], fieldC:[0.697,0.753,0.558,0.58],
  pasture:[0.863,0.812,0.690,0.54], rock:[0.863,0.835,0.784,0.14], village:[0.918,0.886,0.824,0.25]
};
const rgba = (p, m=1) => `rgba(${p[0]*255|0},${p[1]*255|0},${p[2]*255|0},${p[3]*m})`;
function sh2(i,j){ const n = Math.sin(i*127.1+j*311.7)*43758.5453; return n-Math.floor(n); }
function svn(a,b){ const i=Math.floor(a),j=Math.floor(b),fx=a-i,fy=b-j;
  const ux=fx*fx*(3-2*fx), uy=fy*fy*(3-2*fy);
  return (sh2(i,j)*(1-ux)+sh2(i+1,j)*ux)*(1-uy) + (sh2(i,j+1)*(1-ux)+sh2(i+1,j+1)*ux)*uy; }
const standAt = (wx,n) => { const v = svn(wx/175,n/175)*0.68 + svn(wx/64+11.3,n/64-7.1)*0.32;
  return v < 0.4352 ? 0 : v < 0.6054 ? 1 : 2; };

add('the wash', function* () {
  x.globalCompositeOperation = 'destination-over';   // colour goes UNDER the finished line
  const B = 10;
  const fields = [PIG.fieldA, PIG.fieldB, PIG.fieldC];
  for (let py = 0; py < CSSH; py += B) {
    for (let px = 0; px < CSSW; px += B) {
      const wx = CX + (px+B/2 - CSSW/2)/PX, wn = CY - (py+B/2 - CSSH/2)/PX;
      const k = classify(wx, wn);
      let p;
      if (k === 'forest') { const st = standAt(wx, wn);
        p = st===2 ? PIG.forestR : st===1 ? PIG.forestY : PIG.forest; }
      else if (k === 'field') p = fields[Math.floor(svn(wx/130, wn/130)*3) % 3];
      else if (k === 'rock') p = PIG.rock;
      else if (k === 'pasture') p = PIG.pasture;
      else p = PIG.village;
      x.fillStyle = rgba(p, 0.75 + svn(px/34, py/34)*0.45);
      x.fillRect(px-1, py-1, B+2, B+2);
    }
    if (py % (B*3) === 0) yield;
  }
  x.fillStyle = '#f8f6ef'; x.fillRect(0,0,CSSW,CSSH);   // the sheet under everything
  x.globalCompositeOperation = 'source-over';
});

/* ============================================================
   The pump: a time budget per frame, so it never blocks.
   ============================================================ */
const elStage = document.getElementById('stage');
const elFill  = document.getElementById('fill');
const elSpeed = document.getElementById('speed');
const elAgain = document.getElementById('again');
const elLegend= document.getElementById('legend');
let si = 0, it = null, running = false, t0 = 0;

function start() {
  clearSheet();
  si = 0; it = null; running = true; t0 = performance.now();
  elAgain.disabled = true;
  requestAnimationFrame(pump);
}
function pump() {
  if (!running) return;
  // stay under one 60 fps frame at the default speed, or the reveal stutters while
  // claiming to be smooth — the whole point of this prototype is that it never blocks
  const budget = 6 * (+elSpeed.value);
  const tStart = performance.now();
  while (performance.now() - tStart < budget) {
    if (!it) {
      if (si >= STAGES.length) {
        running = false;
        elStage.textContent = 'plate complete';
        elFill.style.width = '100%';
        elAgain.disabled = false;
        const secs = ((performance.now()-t0)/1000).toFixed(1);
        elLegend.innerHTML = `Cut in <b>${secs}s</b> from ${S.buildings.length} surveyed footprints, `
          + `${S.roadsMinor.length + S.roadsMajor.length + S.tracks.length} ways and a 257×257 elevation grid. `
          + `Every mark here is the same routine the map itself runs — this is not a film of the map, it is the map being drawn.`;
        return;
      }
      elStage.textContent = STAGES[si].name;
      it = STAGES[si].gen();
    }
    if (it.next().done) { it = null; si++; }
  }
  elFill.style.width = ((si / STAGES.length) * 100).toFixed(1) + '%';
  requestAnimationFrame(pump);
}
elAgain.addEventListener('click', start);
elLegend.textContent = 'Survey data loaded. Cutting…';
start();
</script>
</body>
</html>
